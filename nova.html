<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#080810">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Nova ✦</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/common.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080810;--surface:#0e0e1a;--surface-2:#141424;--surface-3:#1a1a2e;
  --border:rgba(120,80,255,.12);--border-h:rgba(120,80,255,.3);
  --accent:#7c3aed;--accent2:#6d28d9;--glow:rgba(124,58,237,.35);
  --al:#a78bfa;--ap:rgba(124,58,237,.08);
  --text:#e2e2f0;--muted:#64648a;--dim:#9898b8;
  --user-bg:rgba(124,58,237,.1);--success:#34d399;--error:#f87171;
  --r:16px;--rsm:10px;--rxs:6px;
  --font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --tr:.2s cubic-bezier(.4,0,.2,1);
  --sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:var(--font);font-size:15px;line-height:1.6;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(124,58,237,.3);border-radius:2px}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 60% 40% at 8% 0%,rgba(124,58,237,.07) 0%,transparent 70%),
             radial-gradient(ellipse 40% 30% at 92% 100%,rgba(109,40,217,.05) 0%,transparent 70%);
  pointer-events:none;z-index:0}
#app{position:relative;display:flex;flex-direction:column;
  height:100dvh;height:calc(var(--vh,1vh)*100);overflow:hidden;z-index:1}

/* HEADER */
header{display:flex;align-items:center;gap:10px;
  padding:calc(var(--st) + 10px) 14px 10px;
  background:rgba(8,8,16,.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
.logo{font-size:19px;font-weight:700;letter-spacing:-.5px;flex-shrink:0;user-select:none;
  background:linear-gradient(135deg,#a78bfa,#7c3aed);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text}
.api-btn{padding:7px 12px;background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--rsm);color:var(--dim);font-family:var(--font);font-size:12.5px;
  cursor:pointer;white-space:nowrap;transition:all var(--tr);flex-shrink:0}
.api-btn:hover,.api-btn:active{border-color:var(--accent);color:var(--al)}
.api-btn.set{border-color:var(--success);color:var(--success)}
.hist-btn{width:34px;height:34px;background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--rsm);color:var(--muted);cursor:pointer;display:flex;
  align-items:center;justify-content:center;flex-shrink:0;transition:all var(--tr);
  -webkit-tap-highlight-color:transparent}
.hist-btn:hover{border-color:var(--accent);color:var(--al)}

/* NAV */
nav{display:flex;position:relative;background:rgba(8,8,16,.7);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--border);
  flex-shrink:0;height:50px;z-index:9}
.tab-btn{flex:1;background:none;border:none;color:var(--muted);font-family:var(--font);
  font-size:12.5px;font-weight:500;cursor:pointer;transition:color var(--tr);
  position:relative;z-index:1;display:flex;align-items:center;justify-content:center;
  gap:5px;-webkit-tap-highlight-color:transparent}
.tab-btn.active{color:var(--al)}
.tab-ind{position:absolute;bottom:0;height:2px;
  background:linear-gradient(90deg,var(--accent),var(--al));border-radius:2px 2px 0 0;
  transition:left .25s cubic-bezier(.4,0,.2,1),width .25s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 12px var(--glow)}

/* MAIN */
main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.panel{display:none;flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;flex-direction:column}
.panel.active{display:flex}

/* CHAT */
.ctx-bar{display:flex;flex-wrap:wrap;gap:5px;padding:7px 14px;
  border-bottom:1px solid var(--border);background:rgba(8,8,16,.4);flex-shrink:0}
.ctx-bar:empty{display:none}
.cpill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px 3px 7px;
  border-radius:20px;font-size:11.5px;font-weight:500;animation:pillIn .2s ease}
@keyframes pillIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.cpill.jb{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.22);color:#fca5a5}
.cpill.ch{background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.22);color:var(--al)}
.cpill.sum{background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.25);color:var(--success);cursor:pointer}
.sum-preview{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--rsm);padding:10px 12px;font-size:12.5px;line-height:1.6;color:var(--dim);max-height:160px;overflow-y:auto;white-space:pre-wrap;margin-top:4px}
.sum-model-row{display:flex;gap:6px;align-items:center;margin-bottom:5px}
.sum-model-row .fi{flex:1;font-size:12px;padding:5px 8px}
/* writer's room */
.cpill.wr{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.28);color:#fbbf24;cursor:pointer}
.wr-progress{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:6px 0 10px}
.wr-step{font-size:11.5px;padding:3px 9px;border-radius:20px;border:1px solid var(--border);color:var(--muted)}
.wr-step.active{color:var(--al);border-color:var(--accent);background:var(--ap)}
.wr-step.done{color:var(--success);border-color:rgba(52,211,153,.3);background:rgba(52,211,153,.06)}
.wr-arrow{color:var(--muted);font-size:10px}
.wr-stage{border:1px solid var(--border);border-radius:var(--rsm);margin-bottom:6px;overflow:hidden}
.wr-stage-hdr{display:flex;align-items:center;gap:7px;padding:7px 11px;cursor:pointer;
  background:var(--surface-2);user-select:none;font-size:12.5px}
.wr-stage-hdr:hover{background:var(--surface-3)}
.wr-stage-hdr span.stage-name{flex:1;font-weight:600}
.wr-stage-hdr span.stage-hint{font-size:10.5px;color:var(--muted)}
.wr-stage-body{padding:10px 12px;font-size:13.5px;line-height:1.6;display:none}
.wr-stage.open .wr-stage-body{display:block}
.wr-stage.final{border-color:rgba(124,58,237,.3)}
.wr-stage.final .wr-stage-hdr{background:rgba(124,58,237,.07)}
.wr-stage.final .wr-stage-body{display:block}
.wr-stage-cfg{border:1px solid var(--border);border-radius:var(--rsm);margin-bottom:8px;overflow:hidden}
.wr-stage-cfg-hdr{padding:7px 11px;cursor:pointer;background:var(--surface-2);font-size:12.5px;font-weight:600;
  display:flex;align-items:center;gap:6px;user-select:none}
.wr-stage-cfg-hdr:hover{background:var(--surface-3)}
.wr-stage-cfg-body{padding:10px 12px;display:none;flex-direction:column;gap:7px}
.wr-stage-cfg.open .wr-stage-cfg-body{display:flex}
.cpill button{background:none;border:none;color:inherit;opacity:.6;cursor:pointer;
  font-size:13px;line-height:1;padding:0;display:flex;align-items:center}
.cpill button:hover{opacity:1}

/* MESSAGES */
.messages{flex:1;padding:10px 10px 6px;display:flex;flex-direction:column;
  gap:9px;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.msg{display:flex;gap:9px;animation:msgIn .25s ease;max-width:100%}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;
  align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-top:2px}
.msg.user .avatar{background:linear-gradient(135deg,var(--accent),#9333ea);color:#fff}
.msg.ai .avatar{background:var(--surface-3);border:1px solid var(--border);color:var(--al)}
.mbody{flex:1;min-width:0;max-width:calc(100% - 37px)}
.msg.user .mbody{align-items:flex-end;display:flex;flex-direction:column}
.bubble{padding:9px 13px;border-radius:17px;font-size:14px;line-height:1.65;
  word-break:break-word;overflow-wrap:break-word;max-width:100%}
.msg.user .bubble{background:linear-gradient(135deg,rgba(124,58,237,.18),rgba(109,40,217,.12));
  border:1px solid rgba(124,58,237,.18);border-bottom-right-radius:4px}
.msg.ai .bubble{background:var(--surface-2);border:1px solid var(--border);border-bottom-left-radius:4px}
.mtime{font-size:10.5px;color:var(--muted);margin-top:3px;padding:0 2px}

/* MARKDOWN */
.bubble p{margin:0 0 .45em}
.bubble p:last-child{margin-bottom:0}
.bubble h1,.bubble h2,.bubble h3,.bubble h4{margin:.75em 0 .25em;font-weight:600;
  line-height:1.3;color:var(--al)}
.bubble h1:first-child,.bubble h2:first-child,.bubble h3:first-child{margin-top:0}
.bubble strong{font-weight:600;color:#f0f0ff}
.bubble em{font-style:italic;color:var(--dim)}
.bubble ul,.bubble ol{padding-left:1.3em;margin:.35em 0}
.bubble li{margin:.12em 0}
.bubble blockquote{border-left:3px solid var(--accent);padding:.15em 0 .15em .9em;
  margin:.45em 0;color:var(--dim);font-style:italic}
.bubble code{background:rgba(0,0,0,.45);padding:.12em .38em;border-radius:4px;
  font-family:'SF Mono','Fira Code',Consolas,monospace;font-size:.86em;color:#a5f3a5}
.bubble pre{background:#0a0a0f;border:1px solid var(--border);border-radius:var(--rsm);
  overflow-x:auto;margin:.55em 0;position:relative}
.bubble pre code{background:none;padding:11px 13px;display:block;font-size:12.5px;
  color:var(--text);border-radius:0}
.copy-btn{position:absolute;top:7px;right:7px;padding:3px 7px;background:var(--surface-3);
  border:1px solid var(--border);border-radius:5px;color:var(--muted);font-size:10.5px;
  cursor:pointer;font-family:var(--font);opacity:0;transition:opacity .15s}
.bubble pre:hover .copy-btn,.bubble pre:focus-within .copy-btn{opacity:1}
.copy-btn:hover{color:var(--text);border-color:var(--accent)}
.bubble a{color:var(--al);text-decoration:none}
.bubble a:hover{text-decoration:underline}
.bubble hr{border:none;border-top:1px solid var(--border);margin:.55em 0}
.bubble table{border-collapse:collapse;width:100%;font-size:12.5px;margin:.45em 0}
.bubble th,.bubble td{padding:5px 9px;border:1px solid var(--border);text-align:left}
.bubble th{background:var(--surface-3);color:var(--al);font-weight:600}
.bubble td{background:var(--surface-2)}
.cur{display:inline-block;color:var(--al);animation:blink .8s step-end infinite;
  font-weight:300;line-height:1;vertical-align:text-bottom}
@keyframes blink{50%{opacity:0}}

/* INPUT */
.input-area{flex-shrink:0;background:rgba(8,8,16,.92);backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);
  padding:9px 11px calc(9px + var(--sb))}
.itabs{display:flex;gap:4px;margin-bottom:7px}
.itab{padding:3px 11px;border-radius:20px;font-size:11.5px;font-weight:500;
  cursor:pointer;border:1px solid var(--border);background:none;color:var(--muted);
  font-family:var(--font);transition:all var(--tr)}
.itab.active{background:var(--ap);border-color:var(--accent);color:var(--al)}
.md-editor-box{background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--rsm);transition:border-color var(--tr);overflow:hidden}
.md-editor-box:focus-within{border-color:rgba(124,58,237,.48)}
#userinput{width:100%;min-height:42px;max-height:130px;padding:10px 12px;
  background:transparent;border:none;color:var(--text);font-family:var(--font);
  font-size:14px;line-height:1.5;resize:none;outline:none;
  -webkit-appearance:none;overflow-y:auto;display:block;box-sizing:border-box}
#userinput::placeholder{color:var(--muted)}
#md-preview{padding:8px 12px;font-size:13.5px;line-height:1.55;color:var(--text);
  border-top:1px solid var(--border);max-height:160px;overflow-y:auto}
#md-preview:empty{display:none}
#md-preview p{margin:0 0 4px}#md-preview p:last-child{margin:0}
#md-preview strong,#md-preview b{font-weight:700}
#md-preview em,#md-preview i{font-style:italic;color:var(--dim)}
#md-preview code{background:var(--surface-3);padding:1px 5px;border-radius:3px;font-size:12.5px;font-family:monospace}
#md-preview pre{background:var(--surface-3);padding:7px 10px;border-radius:var(--rxs);overflow-x:auto;margin:3px 0}
#md-preview pre code{background:none;padding:0}
#md-preview h1,#md-preview h2,#md-preview h3{margin:3px 0;line-height:1.3;font-weight:700}
#md-preview ul,#md-preview ol{margin:2px 0;padding-left:18px}
#md-preview li{margin:1px 0}
#md-preview blockquote{border-left:2px solid var(--accent);margin:3px 0;padding-left:9px;color:var(--muted)}
#md-preview a{color:var(--al)}
#md-preview hr{border:none;border-top:1px solid var(--border);margin:4px 0}
.sendbtn{width:42px;height:42px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;border-radius:50%;color:#fff;cursor:pointer;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;transition:all var(--tr);
  box-shadow:0 4px 14px rgba(124,58,237,.28);-webkit-tap-highlight-color:transparent}
.sendbtn:hover{transform:scale(1.06);box-shadow:0 4px 20px rgba(124,58,237,.5)}
.sendbtn:active{transform:scale(.94)}
.sendbtn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.ibtn{padding:4px 9px;background:none;border:1px solid var(--border);border-radius:var(--rxs);
  color:var(--muted);font-size:11.5px;cursor:pointer;font-family:var(--font);
  transition:all var(--tr);-webkit-tap-highlight-color:transparent}
.ibtn:hover,.ibtn:active{border-color:var(--border-h);color:var(--dim)}
.cost{font-size:10.5px;color:var(--muted);flex-shrink:1;min-width:0;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:110px}
.cost .cv{color:var(--al);font-weight:500}

/* CARDS */
.ph{padding:14px 14px 4px;flex-shrink:0}
.ph h2{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-.3px}
.ph p{font-size:12.5px;color:var(--muted);margin-top:3px}
.grid{padding:10px;display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:9px}
.card{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);
  padding:13px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden;
  -webkit-tap-highlight-color:transparent;display:flex;flex-direction:column;gap:5px}
.card::before{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(124,58,237,.04),transparent);
  opacity:0;transition:opacity var(--tr);pointer-events:none}
.card:hover::before,.card:active::before{opacity:1}
.card:hover{border-color:var(--border-h)}
.card.active{border-color:var(--accent);background:rgba(124,58,237,.07);
  box-shadow:0 0 18px rgba(124,58,237,.14)}
.card.jbcard.active{border-color:#ef4444;background:rgba(239,68,68,.07);
  box-shadow:0 0 18px rgba(239,68,68,.14)}
.cicon{font-size:20px;line-height:1}
.cname{font-size:12.5px;font-weight:600;color:var(--text);line-height:1.3}
.cdesc{font-size:11px;color:var(--muted);line-height:1.4}
.cbadge{display:inline-block;padding:2px 6px;border-radius:10px;font-size:10px;
  font-weight:500;background:var(--surface-3);border:1px solid var(--border);color:var(--dim)}
.cacts{display:flex;gap:4px;margin-top:auto;padding-top:5px}
.cact{flex:1;padding:5px 7px;border-radius:var(--rxs);font-size:11px;font-weight:500;
  cursor:pointer;font-family:var(--font);transition:all var(--tr);text-align:center;
  border:1px solid var(--border);background:none;color:var(--dim);
  -webkit-tap-highlight-color:transparent}
.cact:hover,.cact:active{background:var(--ap);border-color:var(--accent);color:var(--al)}
.cact.pri{background:var(--ap);border-color:rgba(124,58,237,.28);color:var(--al)}
.cact.on{background:rgba(52,211,153,.1);border-color:rgba(52,211,153,.28);color:var(--success)}
.cact.danger{border-color:rgba(239,68,68,.3);color:#ef4444}
.cact.danger:hover{background:rgba(239,68,68,.1);border-color:#ef4444}
.addcard{background:transparent;border:1px dashed var(--border-h);border-radius:var(--r);
  padding:13px;cursor:pointer;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:5px;color:var(--muted);font-size:12.5px;font-family:var(--font);
  transition:all var(--tr);min-height:95px;-webkit-tap-highlight-color:transparent}
.addcard:hover,.addcard:active{border-color:var(--accent);color:var(--al);background:var(--ap)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(5px);
  z-index:100;display:flex;align-items:flex-end;justify-content:center;
  animation:fadeIn .15s ease;padding-bottom:var(--sb)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r) var(--r) 0 0;padding:18px 18px calc(18px + var(--sb));
  width:100%;max-width:480px;max-height:88dvh;overflow-y:auto;
  animation:slideUp .2s cubic-bezier(.4,0,.2,1)}
@media(min-height:650px)and(min-width:480px){
  .overlay{align-items:center}
  .modal{border-radius:var(--r);max-height:82dvh}}
@keyframes slideUp{from{transform:translateY(28px);opacity:0}to{transform:translateY(0);opacity:1}}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.mt{font-size:15px;font-weight:600;color:var(--text)}
.mx{background:none;border:none;color:var(--muted);font-size:19px;cursor:pointer;padding:3px;line-height:1}
.mx:hover{color:var(--text)}
.fg{margin-bottom:12px}
.fl{display:block;font-size:12.5px;font-weight:500;color:var(--dim);margin-bottom:5px}
.fi,.ft{width:100%;background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--rsm);color:var(--text);font-family:var(--font);font-size:13.5px;
  padding:9px 11px;outline:none;transition:border-color var(--tr);-webkit-appearance:none}
.fi:focus,.ft:focus{border-color:rgba(124,58,237,.45)}
.ft{resize:vertical;min-height:95px;line-height:1.5}
.fhint{font-size:11px;color:var(--muted);margin-top:4px}
.brow{display:flex;gap:9px;margin-top:18px}
.btn{flex:1;padding:11px;border-radius:var(--rsm);font-family:var(--font);
  font-size:13.5px;font-weight:500;cursor:pointer;transition:all var(--tr);border:none;
  -webkit-tap-highlight-color:transparent}
.btnp{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;
  box-shadow:0 4px 14px rgba(124,58,237,.28)}
.btnp:hover{box-shadow:0 4px 20px rgba(124,58,237,.48);transform:translateY(-1px)}
.btnp:active{transform:translateY(0)}
.btns{background:var(--surface-2);border:1px solid var(--border);color:var(--dim)}
.btns:hover{border-color:var(--border-h);color:var(--text)}

/* TOAST */
.toasts{position:fixed;top:calc(var(--st) + 72px);left:50%;transform:translateX(-50%);
  z-index:200;display:flex;flex-direction:column;gap:7px;pointer-events:none;
  width:calc(100% - 28px);max-width:300px}
.toast{background:var(--surface-3);border:1px solid var(--border-h);border-radius:var(--rsm);
  padding:9px 14px;font-size:12.5px;color:var(--text);text-align:center;
  animation:tin .2s ease,tout .3s ease 2.1s forwards;backdrop-filter:blur(10px)}
.toast.ok{border-color:rgba(52,211,153,.35);color:var(--success)}
.toast.err{border-color:rgba(248,113,113,.35);color:var(--error)}
@keyframes tin{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes tout{to{opacity:0;transform:translateY(-8px)}}

/* EMPTY */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:36px 22px;gap:11px;color:var(--muted);text-align:center}
.empty-star{font-size:38px;filter:drop-shadow(0 0 18px rgba(124,58,237,.4))}
.empty h3{font-size:14.5px;font-weight:600;color:var(--dim)}
.empty p{font-size:12.5px;max-width:210px;line-height:1.5}
.hidden{display:none!important}

/* MSG ACTIONS */
.msg-actions{display:flex;gap:3px;margin-top:5px;opacity:0;transition:opacity .15s;flex-wrap:wrap}
.msg:hover .msg-actions,.msg-actions:focus-within{opacity:1}
@media(pointer:coarse){.msg-actions{opacity:1}}
.mact{background:none;border:1px solid var(--border);border-radius:var(--rxs);color:var(--muted);
  cursor:pointer;padding:3px 7px;font-size:10.5px;display:flex;align-items:center;gap:3px;
  transition:all var(--tr);-webkit-tap-highlight-color:transparent;font-family:var(--font);line-height:1}
.mact:hover,.mact:active{border-color:var(--border-h);color:var(--dim)}
.mact.liked{color:var(--success);border-color:rgba(52,211,153,.28)}
.mact.disliked{color:var(--error);border-color:rgba(248,113,113,.28)}

/* REASONING */
.reasoning{background:var(--surface-3);border:1px solid var(--border);border-radius:var(--rsm);
  margin-bottom:8px;overflow:hidden}
.reasoning-hdr{display:flex;justify-content:space-between;align-items:center;
  padding:7px 11px;cursor:pointer;font-size:12px;color:var(--muted);user-select:none}
.reasoning-hdr:hover{color:var(--dim)}
.reasoning-body{padding:8px 11px 10px;max-height:200px;overflow-y:auto;
  font-size:12px;color:var(--muted);line-height:1.55;white-space:pre-wrap}
.reasoning.collapsed .reasoning-body{display:none}
.r-tog::before{content:'▼ Collapse reasoning'}
.reasoning.collapsed .r-tog::before{content:'▶ Expand reasoning'}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:5px;padding-top:7px}
.tbtn{width:33px;height:33px;background:none;border:1px solid var(--border);border-radius:50%;
  color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all var(--tr);flex-shrink:0;-webkit-tap-highlight-color:transparent}
.tbtn:hover,.tbtn:active{border-color:var(--border-h);color:var(--dim)}
.tbtn.active{border-color:var(--accent);color:var(--al);background:var(--ap)}
.count-badge{background:var(--surface-3);border:1px solid var(--border);border-radius:12px;
  padding:2px 7px;font-size:11px;color:var(--muted);min-width:26px;text-align:center;
  flex-shrink:0;font-weight:500}
.toolbar-spacer{flex:1;min-width:0}

/* ATTACH PREVIEW */
.attach-prev{display:flex;align-items:center;gap:8px;padding:6px 11px;
  background:var(--surface-2);border-bottom:1px solid var(--border);margin:-9px -11px 8px}
.attach-thumb{width:32px;height:32px;border-radius:5px;object-fit:cover;border:1px solid var(--border)}
.attach-name{font-size:11.5px;color:var(--dim);flex:1;min-width:0;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.attach-rmv{background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:16px;padding:2px;line-height:1;transition:color var(--tr)}
.attach-rmv:hover{color:var(--error)}

/* QUICK TOOLS */
.qt-list{display:flex;flex-direction:column;gap:4px;margin-bottom:4px}
.qt-item{padding:8px 11px;border-radius:var(--rsm);cursor:pointer;font-size:13px;
  border:1px solid var(--border);transition:all var(--tr);color:var(--dim)}
.qt-item:hover,.qt-item:active{border-color:var(--border-h);background:var(--surface-2);color:var(--text)}
.qt-item.qt-on{border-color:var(--accent);background:var(--ap);color:var(--al)}


/* MODEL PILL (header) */
.model-pill{display:flex;align-items:center;gap:6px;flex:1;min-width:0;padding:7px 11px;
  background:var(--surface-2);border:1px solid var(--border);border-radius:var(--rsm);
  color:var(--text);font-family:var(--font);font-size:12.5px;font-weight:500;cursor:pointer;
  transition:border-color var(--tr);text-align:left;overflow:hidden;-webkit-tap-highlight-color:transparent}
.model-pill:hover{border-color:var(--accent)}
.model-pill-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.model-pill svg{flex-shrink:0;color:var(--muted)}

/* MODEL PICKER */
.mpicker{position:fixed;inset:0;z-index:150;display:flex;flex-direction:column;
  background:var(--bg);transform:translateY(100%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);overflow:hidden}
.mpicker.open{transform:translateY(0)}
.mpicker-hdr{display:flex;align-items:center;gap:10px;
  padding:calc(var(--st)+12px) 14px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.mpicker-back{background:none;border:none;color:var(--muted);cursor:pointer;
  display:flex;align-items:center;gap:5px;font-size:13px;font-family:var(--font);
  padding:4px 0;-webkit-tap-highlight-color:transparent;transition:color var(--tr)}
.mpicker-back:hover{color:var(--text)}
.mpicker-title{font-size:15px;font-weight:600;color:var(--text);flex:1}
.mpicker-body{padding:10px 14px 4px;flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.mpicker-search-row{display:flex;align-items:center;gap:8px;padding:9px 12px;
  background:var(--surface-2);border:1px solid var(--border);border-radius:var(--rsm)}
.mpicker-search-row svg{color:var(--muted);flex-shrink:0}
#model-search-inp{flex:1;background:none;border:none;outline:none;color:var(--text);
  font-family:var(--font);font-size:14px}
#model-search-inp::placeholder{color:var(--muted)}
.mpicker-chips{display:flex;gap:6px;flex-wrap:wrap}
.mchip{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;
  border:1px solid var(--border);background:none;color:var(--muted);font-family:var(--font);
  transition:all var(--tr);white-space:nowrap;-webkit-tap-highlight-color:transparent}
.mchip:hover{border-color:var(--border-h);color:var(--dim)}
.mchip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.mchip.clear-chip{border-color:var(--border-h);color:var(--dim)}
.mpicker-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.mpicker-sect{padding:9px 14px 3px;font-size:11px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.06em;position:sticky;top:0;
  background:var(--bg);z-index:1;border-bottom:1px solid rgba(120,80,255,.06)}
.mrow{display:flex;align-items:center;gap:12px;padding:10px 14px;
  cursor:pointer;transition:background var(--tr);-webkit-tap-highlight-color:transparent}
.mrow:hover,.mrow:active{background:var(--surface-2)}
.mrow.mrow-sel{background:var(--ap);border-left:2px solid var(--accent);padding-left:12px}
.mprov{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;letter-spacing:-.5px}
.mrow-info{flex:1;min-width:0}
.mrow-name{font-size:13.5px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mrow-meta{font-size:11px;color:var(--muted);margin-top:1px}
.mfree-badge{display:inline-block;padding:1px 5px;border-radius:4px;font-size:10px;font-weight:500;
  background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.2);color:var(--success);margin-left:4px;vertical-align:middle}
.mpin-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:6px;
  font-size:17px;line-height:1;transition:color var(--tr);flex-shrink:0;
  -webkit-tap-highlight-color:transparent}
.mpin-btn:hover{color:var(--dim)}
.mpin-btn.pinned{color:#f59e0b}
.mpicker-empty{padding:36px 20px;text-align:center;color:var(--muted);font-size:13px}

/* MEMORIES */
.mem-list{display:flex;flex-direction:column;gap:5px;margin-top:4px}
.mem-item{display:flex;align-items:flex-start;gap:8px;padding:7px 10px;
  background:var(--surface-2);border:1px solid var(--border);border-radius:var(--rsm);font-size:12.5px;color:var(--dim)}
.mem-txt{flex:1;min-width:0;line-height:1.5;word-break:break-word}
.mem-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;
  padding:0;line-height:1;flex-shrink:0;transition:color var(--tr);margin-top:1px}
.mem-del:hover{color:var(--error)}
.mem-ts{font-size:10.5px;color:var(--muted);margin-top:2px}

/* MULTI-FILE PREV */
.files-prev{display:flex;flex-wrap:wrap;gap:5px;padding:7px 11px;
  background:var(--surface-2);border-bottom:1px solid var(--border);margin:-9px -11px 8px}
.file-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px 3px 7px;
  background:var(--surface-3);border:1px solid var(--border);border-radius:20px;
  font-size:11.5px;color:var(--dim);max-width:180px}
.file-chip img{width:22px;height:22px;border-radius:3px;object-fit:cover;flex-shrink:0}
.file-chip-icon{flex-shrink:0;font-size:14px}
.file-chip-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.file-chip-rmv{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;
  padding:0 0 0 3px;line-height:1;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.file-chip-rmv:hover{color:var(--error)}

/* CHAT DRAWER */
.drawer-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(3px);
  z-index:200;opacity:0;pointer-events:none;transition:opacity .22s ease}
.drawer-backdrop.open{opacity:1;pointer-events:auto}
.chat-drawer{position:fixed;top:0;left:0;bottom:0;width:min(300px,88vw);
  background:var(--surface);border-right:1px solid var(--border);
  z-index:201;display:flex;flex-direction:column;overflow:hidden;
  transform:translateX(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1)}
.chat-drawer.open{transform:translateX(0)}
.drawer-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:calc(var(--st)+12px) 14px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.drawer-hdr-title{font-size:15px;font-weight:600;color:var(--text)}
.drawer-close{background:none;border:none;color:var(--muted);font-size:19px;cursor:pointer;
  padding:3px;line-height:1;-webkit-tap-highlight-color:transparent}
.drawer-close:hover{color:var(--text)}
.drawer-search-row{padding:9px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.drawer-search{width:100%;background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--rsm);color:var(--text);font-family:var(--font);font-size:13px;
  padding:7px 11px;outline:none;transition:border-color var(--tr)}
.drawer-search:focus{border-color:rgba(124,58,237,.45)}
.drawer-search::placeholder{color:var(--muted)}
.drawer-new-row{padding:8px 12px;border-bottom:1px solid var(--border);
  display:flex;gap:6px;flex-shrink:0}
.drawer-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.drawer-date-sep{padding:9px 12px 3px;font-size:10.5px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.06em;position:sticky;top:0;
  background:var(--surface);z-index:1}
.chat-row{display:flex;align-items:center;gap:8px;padding:9px 12px;
  cursor:pointer;transition:background var(--tr);-webkit-tap-highlight-color:transparent;
  border-left:2px solid transparent}
.chat-row:hover,.chat-row:active{background:var(--surface-2)}
.chat-row.current{background:var(--ap);border-left-color:var(--accent)}
.chat-meta{flex:1;min-width:0}
.chat-title-el{font-size:13px;font-weight:500;color:var(--text);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:1px}
.chat-title-el.generating{color:var(--muted);font-style:italic}
.chat-sub{font-size:10.5px;color:var(--muted)}
.chat-acts{display:flex;gap:2px;flex-shrink:0;opacity:0;transition:opacity .15s}
.chat-row:hover .chat-acts{opacity:1}
@media(pointer:coarse){.chat-acts{opacity:1}}
.chat-act{background:none;border:none;color:var(--muted);cursor:pointer;
  padding:4px 5px;font-size:12px;border-radius:4px;transition:all var(--tr);
  -webkit-tap-highlight-color:transparent}
.chat-act:hover{background:var(--surface-3);color:var(--dim)}
.chat-act.danger:hover{color:var(--error)}
.sync-note{font-size:11px;color:var(--muted);padding:6px 12px;
  border-top:1px solid var(--border);flex-shrink:0;line-height:1.5}
.drawer-empty{padding:32px 16px;text-align:center;color:var(--muted);font-size:13px}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">✦ Nova</div>
    <button class="model-pill" id="model-pill" onclick="openPicker()">
      <span class="model-pill-name" id="model-display">GPT-4o</span>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <button class="hist-btn" onclick="openChatDrawer()" title="Chat history" aria-label="Chat history">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="15" y2="18"/></svg>
    </button>
    <button class="api-btn" id="api-btn" onclick="openApiModal()">🔑 Keys</button>
  </header>
  <nav>
    <button class="tab-btn active" data-tab="chat" onclick="switchTab('chat')">💬 Chat</button>
    <button class="tab-btn" data-tab="jailbreaks" onclick="switchTab('jailbreaks')">🔓 Jailbreaks</button>
    <button class="tab-btn" data-tab="characters" onclick="switchTab('characters')">🎭 Characters</button>
    <div class="tab-ind" id="tab-ind"></div>
  </nav>
  <main>
    <div class="panel active" id="panel-chat">
      <div class="ctx-bar" id="ctx-bar"></div>
      <div class="messages" id="messages">
        <div class="empty" id="empty">
          <div class="empty-star">✦</div>
          <h3>Nova is ready</h3>
          <p>Set a character or jailbreak, then start writing.</p>
        </div>
      </div>
      <div class="input-area">
        <div class="files-prev hidden" id="files-prev"></div>
        <div class="md-editor-box">
          <textarea id="userinput" placeholder="Start a new message…" rows="1" aria-label="Message"></textarea>
          <div id="md-preview"></div>
        </div>
        <div class="toolbar">
          <button class="tbtn" id="attach-btn" onclick="attachFile()" title="Attach image">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <span class="count-badge" id="msg-count">0</span>
          <button class="tbtn" onclick="quickTools()" title="Quick tools">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          </button>
          <button class="tbtn" id="mic-btn" onclick="toggleVoice()" title="Voice input">
            <svg width="13" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </button>
          <button class="tbtn" id="web-btn" onclick="toggleWebSearch()" title="Web search (OpenRouter only)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
          </button>
          <button class="tbtn" id="wr-btn" onclick="openWRSettings()" title="Writer's Room">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          </button>
          <div class="toolbar-spacer"></div>
          <div class="cost" id="cost"></div>
          <button class="ibtn" onclick="clearChat()">Clear</button>
          <button class="ibtn" onclick="exportChat()">Export</button>
          <button class="tbtn" onclick="openSettings()" title="Settings &amp; Backup" style="flex-shrink:0">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          </button>
          <button class="sendbtn" id="sendbtn" onclick="sendMsg()" aria-label="Send">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>
    <div class="panel" id="panel-jailbreaks">
      <div class="ph"><h2>Jailbreaks</h2><p>System prompt overrides — stacks below your character.</p></div>
      <div class="grid" id="jb-grid"></div>
    </div>
    <div class="panel" id="panel-characters">
      <div class="ph"><h2>Characters</h2><p>Persona presets — layers on top of any active jailbreak.</p></div>
      <div class="grid" id="ch-grid"></div>
    </div>
  </main>
</div>
<div class="drawer-backdrop" id="drawer-backdrop" onclick="closeChatDrawer()"></div>
<div class="chat-drawer" id="chat-drawer">
  <div class="drawer-hdr">
    <div class="drawer-hdr-title">💬 Chats</div>
    <button class="drawer-close" onclick="closeChatDrawer()">✕</button>
  </div>
  <div class="drawer-search-row">
    <input class="drawer-search" id="drawer-search" type="text" placeholder="Search chats…" autocomplete="off" oninput="filterDrawer(this.value)"/>
  </div>
  <div class="drawer-new-row">
    <button class="btn btnp" style="flex:1;padding:8px" onclick="newChat();closeChatDrawer()">+ New Chat</button>
    <button class="btn btns" id="drawer-sync-btn" style="padding:8px 11px" onclick="setSyncFolder()" title="Sync to folder">📁</button>
  </div>
  <div id="drawer-list" class="drawer-list"></div>
  <div class="sync-note" id="drawer-sync-note" style="display:none"></div>
</div>
<div id="overlay" class="overlay hidden" onclick="handleOvClick(event)">
  <div class="modal" id="modal" onclick="event.stopPropagation()"></div>
</div>
<div class="toasts" id="toasts"></div>

<!-- MODEL PICKER -->
<div class="mpicker" id="mpicker">
  <div class="mpicker-hdr">
    <button class="mpicker-back" onclick="closePicker()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </button>
    <div class="mpicker-title">Choose Model</div>
  </div>
  <div class="mpicker-body">
    <div class="mpicker-search-row">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="model-search-inp" type="text" placeholder="Search models" autocomplete="off" oninput="onPickerSearch(this.value)"/>
    </div>
    <div class="mpicker-chips">
      <button class="mchip" id="chip-free" onclick="toggleChip('free')">Free</button>
      <button class="mchip on" id="chip-hide" onclick="toggleChip('hide')">Hide Unavailable</button>
      <button class="mchip clear-chip" onclick="clearChips()">Clear</button>

// ── INDEXED DB ────────────────────────────────────────────────────────
let _db=null;
async function getDB(){
  if(_db)return _db;
  return new Promise((res,rej)=>{
    const req=indexedDB.open('nova-chats',1);
    req.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains('chats')){
        const s=db.createObjectStore('chats',{keyPath:'id'});
        s.createIndex('updatedAt','updatedAt');
      }
      if(!db.objectStoreNames.contains('meta')){
        db.createObjectStore('meta',{keyPath:'k'});
      }
    };
    req.onsuccess=e=>{_db=e.target.result;res(_db);};
    req.onerror=e=>rej(e.target.error);
  });
}
async function dbPut(store,val){
  const db=await getDB();
  return new Promise((res,rej)=>{const tx=db.transaction(store,'readwrite');tx.objectStore(store).put(val);tx.oncomplete=res;tx.onerror=e=>rej(e.target.error);});
}
async function dbGet(store,key){
  const db=await getDB();
  return new Promise((res,rej)=>{const tx=db.transaction(store,'readonly');const req=tx.objectStore(store).get(key);req.onsuccess=e=>res(e.target.result);req.onerror=e=>rej(e.target.error);});
}
async function dbGetAll(store){
  const db=await getDB();
  return new Promise((res,rej)=>{const tx=db.transaction(store,'readonly');const req=tx.objectStore(store).getAll();req.onsuccess=e=>res(e.target.result);req.onerror=e=>rej(e.target.error);});
}
async function dbDelete(store,key){
  const db=await getDB();
  return new Promise((res,rej)=>{const tx=db.transaction(store,'readwrite');tx.objectStore(store).delete(key);tx.oncomplete=res;tx.onerror=e=>rej(e.target.error);});
}

function getMsgText(msg){
  if(!msg)return'';
  if(typeof msg.content==='string')return msg.content;
  if(Array.isArray(msg.content))return msg.content.filter(c=>c.type==='text').map(c=>c.text).join('\n');
  return'';
}
function getMsgImages(msg){
  if(!msg||typeof msg.content==='string')return[];
  if(Array.isArray(msg.content))return msg.content.filter(c=>c.type==='image_url').map(c=>c.image_url.url);
  return[];
}
function parseThinking(text){
  const full=text.match(/^<(?:antml:)?thinking>([\s\S]*?)<\/(?:antml:)?thinking>\s*/);
  if(full)return{thinking:full[1].trim(),rest:text.slice(full[0].length),partial:false};
  const partial=text.match(/^<(?:antml:)?thinking>([\s\S]*)$/);
  if(partial)return{thinking:partial[1],rest:'',partial:true};
  return{thinking:null,rest:text,partial:false};
}

  if(S.activeCH){const c=S.characters.find(x=>x.id===S.activeCH);if(c)parts.push(c.prompt);}

    parts.unshift(memBlock);

    parts.unshift(`## Conversation Summary\nThe following summarizes the conversation so far. Newer messages appear in full below.\n\n${S.autoSum.summary}`);

}

async function sendMsg(){
  if(S.streaming)return;
  const ta=document.getElementById('userinput');
  const text=ta.value.trim();
  if(!text&&!S.pendingFiles.length)return;
  const _cfg=getApiConfig();if(!_cfg){openApiModal();return;}
  ta.value='';ta.style.height='auto';hideLivePreview();
  document.getElementById('empty')?.remove();

  let userContent=text;
  if(S.pendingFiles.length){
    const parts=[];
    S.pendingFiles.forEach(f=>{
      if(f.type==='image')parts.push({type:'image_url',image_url:{url:f.url}});
      else parts.push({type:'text',text:`[File: ${f.name}]\n\`\`\`\n${f.content}\n\`\`\``});
    });
    if(text)parts.push({type:'text',text});
    userContent=parts;
    clearAllFiles();
  }

  const um={id:uid(),role:'user',content:userContent,ts:Date.now()};
  S.conv.push(um);appendMsg(um);scrollBot();updateMsgCount();
  if(S.writerRoom.enabled&&!S.pendingFiles.length){
    await runWriterRoom(text);
  }else{
    await doSend();
  }
}

async function doSend(){
  if(S.streaming)return;
  S.streaming=true;document.getElementById('sendbtn').disabled=true;
  const am={id:uid(),role:'assistant',content:'',ts:Date.now()};
  const ael=appendMsg(am,true);scrollBot();
  try{
    const sys=buildSysPrompt();
    let convMsgs=S.conv.map(m=>({role:m.role,content:m.content}));
    // when summary is active, only send recent messages — summary covers the rest
    if(S.autoSum.enabled&&S.autoSum.summary&&convMsgs.length>12)convMsgs=convMsgs.slice(-12);

    const cfg=getApiConfig();
    if(!cfg){S.streaming=false;document.getElementById('sendbtn').disabled=false;openApiModal();return;}

    let res;
    if(cfg.backend==='anthropic'){
      // Anthropic Messages API format
      const msgs=convMsgs.filter(m=>m.role!=='system');
      const body={model:cfg.modelId,messages:msgs,max_tokens:8192,stream:true};
      if(sys)body.system=sys;
      res=await fetch(cfg.url,{
        method:'POST',
        headers:{'x-api-key':cfg.key,'anthropic-version':'2023-06-01','content-type':'application/json'},
        body:JSON.stringify(body)
      });
    }else{
      const msgs=[];
      if(sys)msgs.push({role:'system',content:sys});
      msgs.push(...convMsgs);
      const orBody={model:cfg.modelId,messages:msgs,stream:true};
      if(S.webSearch&&cfg.url.includes('openrouter'))orBody.plugins=[{id:'web'}];
      res=await fetch(cfg.url,{
        method:'POST',
        headers:{'Authorization':`Bearer ${cfg.key}`,'Content-Type':'application/json',...(cfg.extra||{})},
        body:JSON.stringify(orBody)
      });
    }
    if(!res.ok){const e=await res.json().catch(()=>({error:{message:`HTTP ${res.status}`}}));throw new Error(e.error?.message||e.error?.type||`HTTP ${res.status}`);}

    const reader=res.body.getReader();const dec=new TextDecoder();
    let acc='',buf='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n');buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        const raw=line.slice(6).trim();if(raw==='[DONE]')continue;
        try{
          const p=JSON.parse(raw);
          // Anthropic SSE: content_block_delta events carry text_delta
          const d=cfg.backend==='anthropic'
            ?(p.type==='content_block_delta'?p.delta?.text:null)
            :p.choices?.[0]?.delta?.content;
          if(d){acc+=d;renderStream(ael,acc);scrollBot();}
          if(p.usage)addCost(p.usage);
          // Anthropic: input tokens in message_start, output tokens in message_delta
          if(p.type==='message_start'&&p.message?.usage)addCost({prompt_tokens:p.message.usage.input_tokens||0,completion_tokens:0,total_tokens:p.message.usage.input_tokens||0});
          if(p.type==='message_delta'&&p.usage)addCost({prompt_tokens:0,completion_tokens:p.usage.output_tokens||0,total_tokens:p.usage.output_tokens||0});
        }catch{}
      }
    }
    am.content=acc;S.conv.push(am);renderFinal(ael,acc);saveS();updateMsgCount();autoSaveChat();checkAutoSum();
  }catch(e){
    am.content=`*Error: ${e.message}*`;S.conv.push(am);renderFinal(ael,am.content);
    saveS();toast(e.message,'err');
  }
  S.streaming=false;document.getElementById('sendbtn').disabled=false;scrollBot();
}

marked.setOptions({gfm:true,breaks:true});

function md(text,streaming=false){
  let t=text;
  if(streaming){const n=(t.match(/```/g)||[]).length;if(n%2!==0)t+='\n```';}
  return DOMPurify.sanitize(marked.parse(t));
}
function renderStream(el,text){
  const{thinking,rest,partial}=parseThinking(text);
  const id=el.dataset.id;
  if(thinking!==null){
    const rb=document.getElementById(`rb-${id}`);
    if(rb){rb.classList.remove('hidden');document.getElementById(`rbody-${id}`).textContent=thinking;}
  }
  const display=partial?'':rest;
  const b=el.querySelector('.bubble');
  b.innerHTML=md(display,true);
  const c=document.createElement('span');c.className='cur';c.textContent='█';b.appendChild(c);
  addCopyBtns(b);
}
function renderFinal(el,text){
  const{thinking,rest}=parseThinking(text);
  const cleaned=parseMemories(rest);
  const id=el.dataset.id;
  if(thinking){
    const rb=document.getElementById(`rb-${id}`);
    if(rb){rb.classList.remove('hidden');document.getElementById(`rbody-${id}`).textContent=thinking;}
  }
  const b=el.querySelector('.bubble');b.innerHTML=md(cleaned,false);addCopyBtns(b);

function addCopyBtns(el){

async function manualSum(){
  if(!S.conv.length){toast('No conversation to summarize','err');return;}
  toast('∑ Summarizing…','info');
  const result=await runSummary();
  if(result){S.autoSum.summary=result;S.autoSum.summaryAt=S.conv.length;saveS();renderCtxBar();toast('∑ Context compressed','ok');}
  else toast('Summary failed','err');
}
async function runSummary(){
  const orKey=S.apiKeys.openrouter||S.apiKey;
  if(!orKey)return null;
  const convoText=S.conv.map(m=>{
    const txt=typeof m.content==='string'?m.content:m.content.filter(p=>p.type==='text').map(p=>p.text).join(' ');
    return `${m.role.toUpperCase()}: ${txt}`;
  }).join('\n\n');
  const sumPrompt=`Summarize the following conversation for use as context. Preserve: character names, relationships, key plot events, tone/genre, important decisions, and any story details worth remembering. Write in dense present-tense narrative. Output only the summary.\n\n${convoText}`;
  const models=S.autoSum.models.slice(0,S.autoSum.count).filter(Boolean);
  if(!models.length)models.push('nousresearch/hermes-3-llama-3.1-70b:free');
  const summaries=await Promise.all(models.map(async mid=>{
    const modelId=mid.startsWith('or::')?mid.slice(4):mid;
    try{
      const r=await fetch('https://openrouter.ai/api/v1/chat/completions',{
        method:'POST',
        headers:{'Authorization':`Bearer ${orKey}`,'Content-Type':'application/json','HTTP-Referer':'https://nova.local','X-Title':'Nova'},
        body:JSON.stringify({model:modelId,messages:[{role:'user',content:sumPrompt}],max_tokens:800,stream:false})
      });
      const d=await r.json();
      return d.choices?.[0]?.message?.content?.trim()||null;
    }catch{return null;}
  }));
  const valid=summaries.filter(Boolean);
  if(!valid.length)return null;
  if(valid.length===1)return valid[0];
  // judge picks best
  const judgeId=(S.autoSum.judgeModel.startsWith('or::')?S.autoSum.judgeModel.slice(4):S.autoSum.judgeModel)||'x-ai/grok-3-mini:free';
  const judgePrompt=`You are given ${valid.length} summaries of the same conversation. Select or synthesize the most complete and accurate one. Output only the final summary, no meta-commentary.\n\n${valid.map((s,i)=>`[Summary ${i+1}]\n${s}`).join('\n\n')}`;
  try{
    const r=await fetch('https://openrouter.ai/api/v1/chat/completions',{
      method:'POST',
      headers:{'Authorization':`Bearer ${orKey}`,'Content-Type':'application/json','HTTP-Referer':'https://nova.local','X-Title':'Nova'},
      body:JSON.stringify({model:judgeId,messages:[{role:'user',content:judgePrompt}],max_tokens:600,stream:false})
    });
    const d=await r.json();
    return d.choices?.[0]?.message?.content?.trim()||valid[0];
  }catch{return valid[0];}
}
async function checkAutoSum(){
  if(!S.autoSum.enabled||S.streaming)return;
  if(S.conv.length<S.autoSum.threshold)return;
  if(S.conv.length-S.autoSum.summaryAt<S.autoSum.threshold)return;
  const result=await runSummary();
  if(result){S.autoSum.summary=result;S.autoSum.summaryAt=S.conv.length;saveS();renderCtxBar();toast('∑ Context compressed','ok');}
}

async function wrCall(stage,userContent){
  const orKey=S.apiKeys.openrouter||S.apiKey;
  if(!orKey)throw new Error('OpenRouter key required for Writer\'s Room');
  const modelId=stage.model.startsWith('or::')?stage.model.slice(4):stage.model;
  const r=await fetch('https://openrouter.ai/api/v1/chat/completions',{
    method:'POST',
    headers:{'Authorization':`Bearer ${orKey}`,'Content-Type':'application/json',
             'HTTP-Referer':'https://nova.local','X-Title':'Nova'},
    body:JSON.stringify({model:modelId,
      messages:[{role:'system',content:stage.prompt},{role:'user',content:userContent}],
      max_tokens:2048,stream:false})
  });
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||`${stage.name} failed: HTTP ${r.status}`);}
  const d=await r.json();
  return(d.choices?.[0]?.message?.content||'').trim();
}

async function runWriterRoom(idea){
  S.streaming=true;document.getElementById('sendbtn').disabled=true;
  const stages=S.writerRoom.stages;
  const lore=S.writerRoom.loreBible;

  // Build progress element
  const wrEl=document.createElement('div');
  wrEl.className='msg assistant';
  const progHtml=stages.map((st,i)=>`<span class="wr-step" id="wr-step-${i}">${st.icon} ${st.name}</span>${i<stages.length-1?'<span class="wr-arrow">›</span>':''}`).join('');
  wrEl.innerHTML=`<div class="bubble"><div class="wr-progress" id="wr-prog">${progHtml}</div><div id="wr-stages"></div></div>`;
  document.getElementById('messages').appendChild(wrEl);
  scrollBot();

  try{
    let prev=idea;
    const outputs=[];
    for(let i=0;i<stages.length;i++){
      const st=stages[i];
      document.getElementById(`wr-step-${i}`)?.classList.add('active');

      // Build stage input
      let input=prev;
      if(i===1&&lore)input=`SCENE OUTLINE:\n${prev}\n\nLORE BIBLE:\n${lore}`;
      else if(i===1)input=`SCENE OUTLINE:\n${prev}`;
      else if(i===3&&lore)input=`PROSE DRAFT:\n${prev}\n\nLORE BIBLE:\n${lore}`;

      const result=await wrCall(st,input);
      outputs.push(result);prev=result;

      // Mark done, render stage
      const stepEl=document.getElementById(`wr-step-${i}`);
      if(stepEl){stepEl.classList.remove('active');stepEl.classList.add('done');}
      const stagesDiv=document.getElementById('wr-stages');
      if(stagesDiv){
        const isFinal=i===stages.length-1;
        const sd=document.createElement('div');
        sd.className=`wr-stage${isFinal?' final':''}`;
        sd.innerHTML=`<div class="wr-stage-hdr" onclick="this.closest('.wr-stage').classList.toggle('open')">
          <span>${st.icon}</span><span class="stage-name">${st.name}</span>
          <span class="stage-hint">${isFinal?'Final output':'click to expand'}</span>
        </div><div class="wr-stage-body">${md(result)}</div>`;
        stagesDiv.appendChild(sd);
      }
      scrollBot();
    }

    // Remove progress bar, save final to conv
    document.getElementById('wr-prog')?.remove();
    const finalText=outputs[outputs.length-1]||'';
    const am={id:uid(),role:'assistant',content:finalText,ts:Date.now()};
    S.conv.push(am);saveS();updateMsgCount();autoSaveChat();checkAutoSum();

  }catch(e){
    toast(e.message,'err');
    const stagesDiv=document.getElementById('wr-stages');
    if(stagesDiv){const ed=document.createElement('div');ed.style.cssText='padding:8px;color:var(--error);font-size:13px';ed.textContent=`Pipeline error: ${e.message}`;stagesDiv.appendChild(ed);}
    document.getElementById('wr-prog')?.remove();
  }
  S.streaming=false;document.getElementById('sendbtn').disabled=false;scrollBot();
}

// ── TITLE GENERATION ─────────────────────────────────────────────────
async function generateChatTitle(messages){
  const orKey=S.apiKeys.openrouter||S.apiKey;
  if(!orKey&&!S.apiKeys.groq&&!S.apiKeys.anthropic&&!S.apiKeys.openai)return null;
  const ctx=messages.slice(0,4).filter(m=>m.role==='user'||m.role==='assistant').map(m=>({
    role:m.role==='assistant'?'assistant':'user',
    content:(typeof m.content==='string'?m.content:getMsgText(m)).slice(0,400)
  }));
  if(!ctx.length)return null;
  let url,headers,modelId;
  if(orKey){
    url='https://openrouter.ai/api/v1/chat/completions';
    headers={'Authorization':`Bearer ${orKey}`,'Content-Type':'application/json','HTTP-Referer':'https://nova.local','X-Title':'Nova'};
    // Grok 4.20 non-agent: fast reasoning, tiny cost at max_tokens:20
    // Falls back through free models if 4.20 isn't available on this key
    modelId='x-ai/grok-4.20';
  }else if(S.apiKeys.groq){
    url='https://api.groq.com/openai/v1/chat/completions';
    headers={'Authorization':`Bearer ${S.apiKeys.groq}`,'Content-Type':'application/json'};
    modelId='llama-3.3-70b-versatile';
  }else if(S.apiKeys.anthropic){
    try{
      const r=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'x-api-key':S.apiKeys.anthropic,'anthropic-version':'2023-06-01','content-type':'application/json'},
        body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:20,messages:[...ctx,{role:'user',content:'Give this conversation a short punchy title. 3-6 words. Witty if the content allows. No quotes, no period at end. Title only.'}]})
      });
      if(!r.ok)return null;
      const d=await r.json();
      return d.content?.[0]?.text?.trim()||null;
    }catch{return null;}
  }else return null;
  const titlePrompt='Give this conversation a short punchy title. 3-6 words. Witty if the content allows. No quotes, no period at end. Title only.';
  const FREE_FALLBACKS=['meta-llama/llama-4-maverick:free','deepseek/deepseek-chat:free','x-ai/grok-3-mini:free'];
  const tryModel=async(mid)=>{
    try{
      const r=await fetch(url,{method:'POST',headers,
        body:JSON.stringify({model:mid,messages:[...ctx,{role:'user',content:titlePrompt}],max_tokens:20,stream:false})});
      if(!r.ok)return null;
      const d=await r.json();
      return d.choices?.[0]?.message?.content?.trim()||null;
    }catch{return null;}
  };
  // Try Grok 4.20 first, then free fallbacks
  for(const mid of[modelId,...FREE_FALLBACKS]){
    const result=await tryModel(mid);
    if(result)return result;
  }
  return null;
}

async function autoSaveChat(){
  if(!S.conv.length)return;
  const existing=await dbGet('chats',S.currentChatId);
  const needsTitle=!existing||!existing.titleGenerated;
  const chat={
    id:S.currentChatId,
    title:existing?.title||chatTitle(),
    titleGenerated:existing?.titleGenerated||false,
    messages:S.conv,
    model:S.selectedModel,
    jb:S.activeJB,
    ch:S.activeCH,
    ts:S.conv[0]?.ts||Date.now(),
    updatedAt:Date.now(),
    msgCount:S.conv.length,
  };
  await dbPut('chats',chat);
  syncChatToFolder(chat);
  renderDrawerList();

  if(needsTitle&&S.conv.length>=2){
    chat.title='✦ Thinking of a title…';
    chat.titleGenerated=false;
    await dbPut('chats',chat);
    renderDrawerList();
    const generated=await generateChatTitle(S.conv);
    if(generated){
      chat.title=generated;
      chat.titleGenerated=true;
      chat.updatedAt=Date.now();
      await dbPut('chats',chat);
      syncChatToFolder(chat);
      renderDrawerList();
    }else{
      chat.title=chatTitle();
      chat.titleGenerated=true;
      await dbPut('chats',chat);
      renderDrawerList();
    }
  }
}

async function renderDrawerList(query=''){
  const list=document.getElementById('drawer-list');if(!list)return;
  let chats=(await dbGetAll('chats')).sort((a,b)=>b.updatedAt-a.updatedAt);
  if(query){
    const q=query.toLowerCase();
    chats=chats.filter(c=>c.title.toLowerCase().includes(q)||getMsgText(c.messages?.[0]||{}).toLowerCase().includes(q));
  }
  if(!chats.length){
    list.innerHTML=`<div class="drawer-empty">No chats yet.<br>Send a message to start.</div>`;
    updateDrawerSyncNote();return;
  }
  const now=Date.now();
  const groups={};
  const groupKey=ts=>{
    const d=now-ts;
    if(d<86400000)return'Today';
    if(d<172800000)return'Yesterday';
    if(d<604800000)return'This week';
    const dt=new Date(ts);
    return dt.toLocaleString('en',{month:'long',year:'numeric'});
  };
  chats.forEach(c=>{const k=groupKey(c.updatedAt);if(!groups[k])groups[k]=[];groups[k].push(c);});
  const order=['Today','Yesterday','This week'];
  const sortedKeys=[...order.filter(k=>groups[k]),...Object.keys(groups).filter(k=>!order.includes(k))];
  list.innerHTML=sortedKeys.map(k=>`
    <div class="drawer-date-sep">${k}</div>
    ${groups[k].map(c=>`
      <div class="chat-row${c.id===S.currentChatId?' current':''}" onclick="loadChatEntry('${c.id}');closeChatDrawer()">
        <div class="chat-meta">
          <div class="chat-title-el${c.titleGenerated===false&&c.title.startsWith('✦')?' generating':''}">${c.title.replace(/</g,'&lt;')}</div>
          <div class="chat-sub">${new Date(c.updatedAt).toLocaleDateString()} · ${c.msgCount} msgs</div>
        </div>
        <div class="chat-acts">
          <button class="chat-act" onclick="renameChatEntry('${c.id}',event)" title="Rename">✎</button>
          <button class="chat-act" onclick="exportChatEntry('${c.id}',event)" title="Export">⬇</button>
          <button class="chat-act danger" onclick="deleteChatEntry('${c.id}',event)" title="Delete">✕</button>
        </div>
      </div>`).join('')}`).join('');
  updateDrawerSyncNote();
}

function updateDrawerSyncNote(){

  const syncBtn=document.getElementById('drawer-sync-btn');
  if(!note)return;

async function initSyncDir(){

async function setSyncFolder(){

  try{
    const dh=await window.showDirectoryPicker({mode:'readwrite'});
    _syncDirHandle=dh;

async function syncChatToFolder(chat){
  if(!_syncDirHandle)return;
  try{
    const perm=await _syncDirHandle.requestPermission({mode:'readwrite'});
    if(perm!=='granted')return;
    const fh=await _syncDirHandle.getFileHandle(`nova-${chat.id}.json`,{create:true});
    const w=await fh.createWritable();
    await w.write(JSON.stringify(chat,null,2));
    await w.close();
  }catch(e){console.warn('Sync failed:',e);}
}

function renderPickerList(q=(document.getElementById('model-search-inp')?.value||'')){
  const query=q.toLowerCase();
  const pins=new Set(S.pinned);

  let models=_allModels.filter(m=>{
    if(query&&!m.name.toLowerCase().includes(query)&&!m.id.toLowerCase().includes(query))return false;
    if(_pickerFilters.free&&!m.free)return false;
    if(_pickerFilters.hide){
      const b=m.backend||'openrouter';
      if(b==='groq'&&!S.apiKeys.groq)return false;
      if(b==='anthropic'&&!S.apiKeys.anthropic)return false;
      if(b==='openai'&&!S.apiKeys.openai)return false;
      if(!m.backend&&!(S.apiKeys.openrouter||S.apiKey))return false;
    }
    return true;
  });

  const pinned=models.filter(m=>pins.has(m.id));
  const rest=models.filter(m=>!pins.has(m.id));

  const groups={};
  rest.forEach(m=>{const k=m.date||'Other';if(!groups[k])groups[k]=[];groups[k].push(m);});
  const dates=Object.keys(groups).sort((a,b)=>b.localeCompare(a));

  const fmtDate=d=>{
    try{const dt=new Date(d+'-01');return dt.toLocaleString('en',{month:'long',year:'numeric'});}catch{return d;}
  };

  let html='';
  if(pinned.length){
    html+=`<div class="mpicker-sect">Pinned</div>`;
    html+=pinned.map(m=>mRow(m)).join('');
  }
  dates.forEach(d=>{
    html+=`<div class="mpicker-sect">${fmtDate(d)}</div>`;
    html+=groups[d].map(m=>mRow(m)).join('');
  });

  document.getElementById('mpicker-list').innerHTML=html||'<div class="mpicker-empty">No models match</div>';
}

function mRow(m){
  const pm=PROVIDER_META[m.provider]||{abbr:(m.provider||'?')[0].toUpperCase(),color:'#555'};
  const sel=S.selectedModel===m.id;
  const pinned=S.pinned.includes(m.id);
  const idSafe=m.id.replace(/['"]/g,'');
  return`<div class="mrow${sel?' mrow-sel':''}" onclick="selectModel('${idSafe}')">
    <div class="mprov" style="background:${pm.color}">${pm.abbr}</div>
    <div class="mrow-info">
      <div class="mrow-name">${m.name}${m.free?'<span class="mfree-badge">free</span>':''}</div>
      ${m.ctx||m.backend?`<div class="mrow-meta">${m.ctx?Math.round(m.ctx/1000)+'k ctx':''}${m.backend==='groq'?' · Direct Groq':''}</div>`:''}
    </div>

  const m=S.conv.find(x=>x.id===id);if(!m)return;
  const content=getMsgText(m);
  const name=`story_${new Date().toISOString().slice(0,10)}_${Date.now()}.txt`;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type:'text/plain'}));
  a.download=name;a.click();toast('Saved!','ok');
}
function toggleReason(id){
  const rb=document.getElementById(`rb-${id}`);if(rb)rb.classList.toggle('collapsed');
}
function updateMsgCount(){
  const el=document.getElementById('msg-count');if(el)el.textContent=S.conv.length;
}

// ── MEMORIES ─────────────────────────────────────────────────────────
function parseMemories(text){
  const re=/<remember>([\s\S]*?)<\/remember>/gi;
  const found=[];
  const cleaned=text.replace(re,(_,c)=>{found.push(c.trim());return'';});
  if(found.length){
    found.forEach(c=>S.memories.push({id:uid(),content:c,ts:Date.now()}));
    saveS();toast(`✦ Saved ${found.length} memor${found.length>1?'ies':'y'}`,'ok');
  }
  return cleaned.trim();
}
function openMemories(){
  const list=S.memories.length
    ?S.memories.map(m=>`<div class="mem-item"><div style="flex:1;min-width:0"><div class="mem-txt">${m.content.replace(/</g,'&lt;')}</div><div class="mem-ts">${new Date(m.ts).toLocaleDateString()}</div></div><button class="mem-del" onclick="deleteMemory('${m.id}')">✕</button></div>`).join('')
    :'<div style="color:var(--muted);font-size:12.5px;padding:4px 0">No memories yet. Ask the model to remember something by including &lt;remember&gt;...&lt;/remember&gt; in its response.</div>';
  showModal(`<div class="mh"><div class="mt">✦ Memories</div><button class="mx" onclick="closeModal()">✕</button></div>
    <div class="mem-list">${list}</div>
    <div class="brow" style="margin-top:14px">
      <button class="btn btns" onclick="addMemoryModal()">+ Add</button>
      ${S.memories.length?`<button class="btn btns" style="color:var(--error);border-color:rgba(248,113,113,.25)" onclick="clearMemories()">Clear All</button>`:''}
      <button class="btn btnp" onclick="closeModal()">Done</button>
    </div>`);
}
function deleteMemory(id){
  S.memories=S.memories.filter(m=>m.id!==id);saveS();openMemories();
}
function clearMemories(){
  if(!confirm('Clear all memories?'))return;
  S.memories=[];saveS();openMemories();
}
function addMemoryModal(){
  showModal(`<div class="mh"><div class="mt">Add Memory</div><button class="mx" onclick="closeModal()">✕</button></div>
    <div class="fg"><label class="fl">Memory content</label>
    <textarea class="ft" id="mem-inp" placeholder="e.g. LO prefers dark endings. His WIP is set in 1920s Paris." style="min-height:80px"></textarea></div>
    <div class="brow"><button class="btn btns" onclick="openMemories()">Back</button>
    <button class="btn btnp" onclick="saveManualMemory()">Save</button></div>`);
  setTimeout(()=>document.getElementById('mem-inp')?.focus(),100);
}
function saveManualMemory(){
  const c=(document.getElementById('mem-inp')?.value||'').trim();
  if(!c){toast('Memory cannot be empty','err');return;}
  S.memories.push({id:uid(),content:c,ts:Date.now()});
  saveS();openMemories();toast('Memory saved','ok');
}

// ── ATTACH ────────────────────────────────────────────────────────────
const TEXT_EXTS=/\.(txt|md|markdown|py|js|ts|jsx|tsx|json|csv|html|css|xml|yaml|yml|toml|sh|bash|c|cpp|h|java|rs|go|rb|php|sql|r|swift|kt|scala|lua|pl|ps1)$/i;

async function loadPDFJS(){
  if(window.pdfjsLib)return;
  await new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload=res;s.onerror=rej;document.head.appendChild(s);
  });
  window.pdfjsLib.GlobalWorkerOptions.workerSrc=
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

async function extractPDFText(file){
  try{
    await loadPDFJS();
    const ab=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:ab}).promise;
    const pages=[];
    for(let i=1;i<=Math.min(pdf.numPages,30);i++){
      const pg=await pdf.getPage(i);
      const ct=await pg.getTextContent();
      pages.push(ct.items.map(it=>it.str).join(' '));
    }
    return pages.join('\n\n');
  }catch(e){return`[PDF text extraction failed: ${e.message}]`;}
}

function attachFile(){
  if(S.pendingFiles.length>=4){toast('Max 4 files at once','err');return;}
  const inp=document.createElement('input');
  inp.type='file';
  inp.accept='image/*,.pdf,.txt,.md,.py,.js,.ts,.jsx,.tsx,.json,.csv,.html,.css,.xml,.yaml,.yml,.toml,.sh,.c,.cpp,.h,.java,.rs,.go,.rb,.php,.sql';
  inp.multiple=true;
  inp.onchange=async e=>{
    const files=Array.from(e.target.files||[]);
    for(const file of files){
      if(S.pendingFiles.length>=4){toast('Max 4 files','err');break;}
      if(file.size>10*1024*1024){toast(`${file.name}: max 10MB`,'err');continue;}
      if(file.type.startsWith('image/')){
        const url=await new Promise(res=>{
          const r=new FileReader();r.onload=ev=>res(ev.target.result);r.readAsDataURL(file);
        });
        S.pendingFiles.push({type:'image',url,name:file.name});
        toast(`Attached: ${file.name}`,'ok');
      }else if(file.name.endsWith('.pdf')){
        toast('Reading PDF…');
        const content=await extractPDFText(file);
        S.pendingFiles.push({type:'pdf',content,name:file.name});
        toast(`PDF ready: ${file.name}`,'ok');
      }else if(TEXT_EXTS.test(file.name)||file.type.startsWith('text/')){
        const content=await new Promise(res=>{
          const r=new FileReader();r.onload=ev=>res(ev.target.result);r.readAsText(file);
        });
        S.pendingFiles.push({type:'text',content,name:file.name});
        toast(`Attached: ${file.name}`,'ok');
      }else{
        toast(`Unsupported: ${file.name}`,'err');
      }
    }
    updateFilePrev();
  };
  inp.click();
}

function clearFile(idx){
  S.pendingFiles.splice(idx,1);updateFilePrev();
}
function clearAllFiles(){S.pendingFiles=[];updateFilePrev();}

function updateFilePrev(){
  const el=document.getElementById('files-prev');if(!el)return;
  if(!S.pendingFiles.length){el.classList.add('hidden');el.innerHTML='';return;}
  el.classList.remove('hidden');
  el.innerHTML=S.pendingFiles.map((f,i)=>{
    const icon=f.type==='image'?`<img src="${f.url}" alt=""/>`
      :f.type==='pdf'?`<span class="file-chip-icon">📄</span>`
      :`<span class="file-chip-icon">📝</span>`;
    return`<div class="file-chip">${icon}<span class="file-chip-name">${f.name}</span><button class="file-chip-rmv" onclick="clearFile(${i})">✕</button></div>`;
  }).join('');
}

// ── VOICE ─────────────────────────────────────────────────────────────
let _sr=null;
function toggleWebSearch(){
  const isOR=S.selectedModel.startsWith('or::')||!S.selectedModel.includes('::');
  if(!isOR){toast('Web search only works with OpenRouter models','err');return;}
  S.webSearch=!S.webSearch;
  document.getElementById('web-btn').classList.toggle('active',S.webSearch);
  toast(S.webSearch?'🌐 Web search ON':'Web search off', S.webSearch?'ok':'info');
}

function toggleVoice(){
  if(_sr){_sr.stop();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast('Voice not supported in this browser','err');return;}
  _sr=new SR();_sr.continuous=true;_sr.interimResults=true;_sr.lang='en-US';
  _sr.onresult=e=>{
    let t='';for(let i=e.resultIndex;i<e.results.length;i++)t+=e.results[i][0].transcript;
    const ta=document.getElementById('userinput');ta.value+=t;ta.dispatchEvent(new Event('input'));
  };
  _sr.onend=()=>{_sr=null;updateMicBtn();};
  _sr.onerror=e=>{_sr=null;updateMicBtn();if(e.error!=='no-speech')toast('Voice: '+e.error,'err');};
  _sr.start();updateMicBtn();
}
function updateMicBtn(){
  const btn=document.getElementById('mic-btn');if(!btn)return;
  btn.classList.toggle('active',!!_sr);
  btn.title=_sr?'Stop recording':'Voice input';
}

// ── QUICK TOOLS ───────────────────────────────────────────────────────
function quickTools(){
  const jbList=S.jailbreaks.map(j=>`<div class="qt-item${S.activeJB===j.id?' qt-on':''}" onclick="toggleJB('${j.id}');closeModal()">${j.icon} ${j.name}${S.activeJB===j.id?' ✓':''}</div>`).join('');

    :'<div style="font-size:12px;color:var(--muted);padding:3px 11px">No memories yet.</div>';

    <div class="brow"><button class="btn btns" onclick="closeModal()">Close</button></div>`);
}

// ── SETTINGS / BACKUP ─────────────────────────────────────────────────

  const convLen=S.conv.length;
  const chars=S.characters.length;
  const jbs=S.jailbreaks.length;
  showModal(`<div class="mh"><div class="mt">⚙ Settings &amp; Backup</div><button class="mx" onclick="closeModal()">✕</button></div>

    <div class="fg">
      <div class="fl">Storage</div>
      <div style="background:var(--surface-2);border:1px solid var(--border);border-radius:var(--rsm);padding:10px 12px;font-size:12.5px;color:var(--dim);display:flex;flex-direction:column;gap:4px">
        <span>📦 localStorage: <strong style="color:var(--text)">${sizeKb} KB</strong></span>
        <span>💬 Messages: <strong style="color:var(--text)">${convLen}</strong></span>
        <span>🎭 Characters: <strong style="color:var(--text)">${chars}</strong> &nbsp;🔓 Jailbreaks: <strong style="color:var(--text)">${jbs}</strong></span>
        <div style="color:var(--muted);font-size:11px;margin-top:2px">Data persists automatically when you update nova.html — same browser, same origin. Use backup to move between devices or browsers.</div>
      </div>
    </div>

    <div class="fg">
      <div class="fl">Backup &amp; Restore</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn btnp" onclick="exportAllData()">⬇ Export All Data (JSON)</button>
        <button class="btn btns" onclick="triggerImport()">⬆ Import Backup</button>
        <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)"/>
      </div>
      <div class="fhint">Export saves everything: API keys, characters, jailbreaks, conversations, pinned models, settings.</div>
    </div>

    <div class="fg">
      <div class="fl">∑ Auto-Summary</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--dim);cursor:pointer">
          <input type="checkbox" id="as-enabled" ${S.autoSum.enabled?'checked':''} onchange="saveSumSettings()"/>
          Compress context automatically

          <label class="fl" style="margin:0;font-size:12px;white-space:nowrap">Every</label>
          <select class="fi" id="as-threshold" style="flex:1;font-size:12px;padding:5px 8px" onchange="saveSumSettings()">
            ${[10,20,30,50].map(n=>`<option value="${n}"${S.autoSum.threshold===n?' selected':''}>${n} messages</option>`).join('')}
          </select>
        </div>
        <div style="display:flex;gap:10px;align-items:center">
          <label class="fl" style="margin:0;font-size:12px;white-space:nowrap">Summaries</label>
          <select class="fi" id="as-count" style="flex:1;font-size:12px;padding:5px 8px" onchange="saveSumSettings();renderSumModelInputs()">
            ${[1,2,3].map(n=>`<option value="${n}"${S.autoSum.count===n?' selected':''}>${n}</option>`).join('')}
          </select>
        </div>
        <div id="as-models">${buildSumModelInputsHTML()}</div>
        <div id="as-judge-row" style="${S.autoSum.count>1?'':'display:none'}">
          <label class="fl" style="font-size:12px">Judge Model</label>

        </div>

        <button class="btn btns" onclick="manualSum();closeModal()" style="font-size:12px">∑ Summarize Now</button>
      </div>

function exportAllData(){
  const data=localStorage.getItem('nova')||'{}';
  const parsed=JSON.parse(data);
  // Add export metadata
  parsed._exportedAt=new Date().toISOString();
  parsed._version='nova-1';
  const blob=new Blob([JSON.stringify(parsed,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`nova-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  toast('Backup downloaded!','ok');
}

function triggerImport(){
  document.getElementById('import-file')?.click();
}

function importData(e){
  const file=e.target.files?.[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=evt=>{
    try{
      const data=JSON.parse(evt.target.result);
      if(!data||typeof data!=='object')throw new Error('Invalid file');
      // Strip metadata keys before restoring
      delete data._exportedAt;delete data._version;
      localStorage.setItem('nova',JSON.stringify(data));
      closeModal();
      toast('Restored! Reloading…','ok');
      setTimeout(()=>location.reload(),800);
    }catch(err){
      toast('Import failed: '+err.message,'err');
    }
  };
  reader.readAsText(file);
  // Reset file input so same file can be re-selected
  e.target.value='';
}

function resetAll(){
  if(!confirm('Delete ALL Nova data? This cannot be undone.'))return;
  localStorage.removeItem('nova');
  closeModal();
  toast('Reset complete. Reloading…');
  setTimeout(()=>location.reload(),800);
}

// ── MODAL ─────────────────────────────────────────────────────────────
function showModal(html){
  document.getElementById('modal').innerHTML=html;
  document.getElementById('overlay').classList.remove('hidden');
}
function closeModal(){document.getElementById('overlay').classList.add('hidden');}
function handleOvClick(e){if(e.target===document.getElementById('overlay'))closeModal();}

// ── TOAST ─────────────────────────────────────────────────────────────
function toast(msg,type=''){
  const c=document.getElementById('toasts');
  const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;
  c.appendChild(t);setTimeout(()=>t.remove(),2600);
}
</script>
