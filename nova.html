<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#080810">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Nova</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/common.min.js"></script>
<style>
/* ── RESET ─────────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg:#07070f;
  --s1:#0d0d1c;
  --s2:#121224;
  --s3:#18182e;
  --border:rgba(120,80,255,.1);
  --bh:rgba(120,80,255,.28);
  --acc:#7c3aed;
  --acc2:#6d28d9;
  --glow:rgba(124,58,237,.35);
  --al:#a78bfa;
  --ap:rgba(124,58,237,.08);
  --txt:#e2e2f2;
  --dim:#9898b8;
  --muted:#55557a;
  --ok:#34d399;
  --err:#f87171;
  --r:16px;--rs:10px;--rx:6px;
  --font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --ease:.2s cubic-bezier(.4,0,.2,1);
  --sb:env(safe-area-inset-bottom,0px);
  --st:env(safe-area-inset-top,0px);
}

html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);
  font-family:var(--font);font-size:15px;line-height:1.6;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  overscroll-behavior:none}

::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(124,58,237,.25);border-radius:2px}

/* ── AMBIENT ───────────────────────────────────────────────────────── */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 0%,rgba(124,58,237,.07) 0%,transparent 70%),
    radial-gradient(ellipse 50% 40% at 85% 100%,rgba(109,40,217,.06) 0%,transparent 70%),
    radial-gradient(ellipse 30% 25% at 50% 50%,rgba(124,58,237,.025) 0%,transparent 60%)}

/* ── SHELL ─────────────────────────────────────────────────────────── */
#app{
  position:relative;z-index:1;
  display:flex;flex-direction:column;
  height:100dvh;
  height:calc(var(--vh,1vh)*100);
  overflow:hidden}

/* ── HEADER ────────────────────────────────────────────────────────── */
header{
  display:flex;align-items:center;gap:10px;flex-shrink:0;
  padding:calc(var(--st) + 10px) 14px 10px;
  background:rgba(7,7,15,.88);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);z-index:10}

.logo{
  font-size:19px;font-weight:700;letter-spacing:-.5px;flex-shrink:0;
  user-select:none;
  background:linear-gradient(135deg,#c4b5fd,#7c3aed);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.model-wrap{flex:1;min-width:0;position:relative}
.model-wrap::after{
  content:'▾';position:absolute;right:10px;top:50%;transform:translateY(-50%);
  color:var(--muted);pointer-events:none;font-size:11px}

#model-select{
  width:100%;padding:8px 28px 8px 11px;
  background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);
  color:var(--txt);font-family:var(--font);font-size:12.5px;font-weight:500;
  cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;
  transition:border-color var(--ease);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#model-select:focus{border-color:var(--acc)}
#model-select option{background:#141428}

.hbtn{
  padding:8px 12px;background:var(--s2);border:1px solid var(--border);
  border-radius:var(--rs);color:var(--dim);font-family:var(--font);font-size:12.5px;
  cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all var(--ease)}
.hbtn:hover,.hbtn:active{border-color:var(--acc);color:var(--al)}
.hbtn.keyed{border-color:rgba(52,211,153,.3);color:var(--ok)}

/* ── NAV ───────────────────────────────────────────────────────────── */
nav{
  display:flex;position:relative;flex-shrink:0;height:50px;
  background:rgba(7,7,15,.75);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);z-index:9}

.tab{
  flex:1;background:none;border:none;color:var(--muted);
  font-family:var(--font);font-size:12.5px;font-weight:500;
  cursor:pointer;transition:color var(--ease);
  display:flex;align-items:center;justify-content:center;gap:5px;
  -webkit-tap-highlight-color:transparent;z-index:1;position:relative}
.tab .ti{font-size:14px;line-height:1}
.tab.on{color:var(--al)}

.tab-line{
  position:absolute;bottom:0;height:2px;border-radius:2px 2px 0 0;
  background:linear-gradient(90deg,var(--acc),var(--al));
  box-shadow:0 0 12px var(--glow);
  transition:left .25s cubic-bezier(.4,0,.2,1),width .25s cubic-bezier(.4,0,.2,1)}

/* ── PANELS ────────────────────────────────────────────────────────── */
main{flex:1;overflow:hidden;display:flex;flex-direction:column;position:relative}

.panel{display:none;flex:1;flex-direction:column;overflow:hidden}
.panel.on{display:flex}

/* ── CHAT ──────────────────────────────────────────────────────────── */
.ctx-bar{
  display:flex;flex-wrap:wrap;gap:6px;padding:8px 14px;flex-shrink:0;
  border-bottom:1px solid var(--border);background:rgba(7,7,15,.4)}
.ctx-bar:empty{display:none}

.pill{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 9px 3px 8px;border-radius:20px;font-size:12px;font-weight:500;
  animation:popIn .2s ease}
@keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.pill.jb{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.22);color:#fca5a5}
.pill.ch{background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.22);color:var(--al)}
.pill-x{background:none;border:none;color:inherit;opacity:.6;cursor:pointer;
  font-size:14px;padding:0;display:flex;align-items:center;line-height:1}
.pill-x:hover{opacity:1}

/* ── MESSAGES ──────────────────────────────────────────────────────── */
.msgs{
  flex:1;padding:14px 12px 10px;
  display:flex;flex-direction:column;gap:12px;
  overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}

.msg{display:flex;gap:10px;animation:rise .22s ease;max-width:100%}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg.u{flex-direction:row-reverse}

.av{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;margin-top:1px}
.msg.u .av{background:linear-gradient(135deg,var(--acc),#9333ea);color:#fff}
.msg.a .av{background:var(--s3);border:1px solid var(--border);color:var(--al);font-size:14px}

.mbody{flex:1;min-width:0;max-width:calc(100% - 42px)}
.msg.u .mbody{display:flex;flex-direction:column;align-items:flex-end}

.bbl{
  padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.68;
  word-break:break-word;overflow-wrap:break-word;max-width:100%}
.msg.u .bbl{
  background:linear-gradient(135deg,rgba(124,58,237,.18),rgba(109,40,217,.12));
  border:1px solid rgba(124,58,237,.18);border-bottom-right-radius:4px;color:var(--txt)}
.msg.a .bbl{
  background:var(--s2);border:1px solid var(--border);
  border-bottom-left-radius:4px;color:var(--txt)}

.mtime{font-size:11px;color:var(--muted);margin-top:4px;padding:0 2px}

/* ── MARKDOWN ──────────────────────────────────────────────────────── */
.bbl p{margin:0 0 .5em}
.bbl p:last-child{margin-bottom:0}
.bbl h1,.bbl h2,.bbl h3,.bbl h4,.bbl h5,.bbl h6{
  margin:.8em 0 .3em;font-weight:600;line-height:1.3;color:var(--al)}
.bbl h1:first-child,.bbl h2:first-child,.bbl h3:first-child{margin-top:0}
.bbl strong{font-weight:600;color:#f0f0ff}
.bbl em{font-style:italic;color:var(--dim)}
.bbl ul,.bbl ol{padding-left:1.4em;margin:.4em 0}
.bbl li{margin:.15em 0}
.bbl blockquote{
  border-left:3px solid var(--acc);padding:.2em 0 .2em 1em;
  margin:.5em 0;color:var(--dim);font-style:italic}
.bbl code{
  background:rgba(0,0,0,.45);padding:.15em .4em;border-radius:4px;
  font-family:'SF Mono','Fira Code',Consolas,monospace;font-size:.87em;color:#86efac}
.bbl pre{
  background:#090912;border:1px solid var(--border);border-radius:var(--rs);
  overflow-x:auto;margin:.6em 0;position:relative}
.bbl pre code{background:none;padding:12px 14px;display:block;font-size:13px;
  color:var(--txt);border-radius:0}
.bbl a{color:var(--al);text-decoration:none}
.bbl a:hover{text-decoration:underline}
.bbl hr{border:none;border-top:1px solid var(--border);margin:.6em 0}
.bbl table{border-collapse:collapse;width:100%;font-size:13px;margin:.5em 0}
.bbl th,.bbl td{padding:6px 10px;border:1px solid var(--border);text-align:left}
.bbl th{background:var(--s3);color:var(--al);font-weight:600}
.bbl td{background:var(--s2)}

.cpbtn{
  position:absolute;top:7px;right:7px;padding:3px 8px;
  background:var(--s3);border:1px solid var(--border);border-radius:5px;
  color:var(--muted);font-size:11px;cursor:pointer;font-family:var(--font);
  opacity:0;transition:opacity .15s}
.bbl pre:hover .cpbtn,.bbl pre:focus-within .cpbtn{opacity:1}
.cpbtn:hover{color:var(--txt);border-color:var(--acc)}

.cur{
  display:inline-block;color:var(--al);font-weight:300;font-size:1em;
  line-height:1;vertical-align:text-bottom;
  animation:blink .75s step-end infinite}
@keyframes blink{50%{opacity:0}}

/* ── EMPTY STATE ───────────────────────────────────────────────────── */
.empty{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:40px 24px;gap:14px;
  color:var(--muted);text-align:center}
.empty-star{font-size:44px;filter:drop-shadow(0 0 20px rgba(124,58,237,.5))}
.empty h3{font-size:16px;font-weight:600;color:var(--dim)}
.empty p{font-size:13px;max-width:220px;line-height:1.6}

/* ── INPUT AREA ────────────────────────────────────────────────────── */
.inp-wrap{
  flex-shrink:0;
  background:rgba(7,7,15,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  padding:10px 12px calc(10px + var(--sb))}

.inp-tabs{display:flex;gap:4px;margin-bottom:8px}
.itab{
  padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;
  cursor:pointer;border:1px solid var(--border);background:none;
  color:var(--muted);font-family:var(--font);transition:all var(--ease)}
.itab.on{background:var(--ap);border-color:var(--acc);color:var(--al)}

.inp-row{display:flex;gap:8px;align-items:flex-end}

#uinput{
  flex:1;min-height:44px;max-height:140px;padding:11px 13px;
  background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);
  color:var(--txt);font-family:var(--font);font-size:14px;line-height:1.5;
  resize:none;outline:none;transition:border-color var(--ease);
  -webkit-appearance:none;overflow-y:auto}
#uinput:focus{border-color:rgba(124,58,237,.45)}
#uinput::placeholder{color:var(--muted)}

#preview{
  flex:1;min-height:44px;max-height:140px;padding:11px 13px;
  background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);
  font-size:14px;line-height:1.5;overflow-y:auto;color:var(--txt);display:none}

.sndbtn{
  width:44px;height:44px;flex-shrink:0;
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  border:none;border-radius:50%;color:#fff;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all var(--ease);
  box-shadow:0 4px 18px rgba(124,58,237,.3);
  -webkit-tap-highlight-color:transparent}
.sndbtn:hover{transform:scale(1.06);box-shadow:0 4px 24px rgba(124,58,237,.5)}
.sndbtn:active{transform:scale(.94)}
.sndbtn:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}

.inp-foot{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:7px;gap:8px}
.inp-foot-l{display:flex;gap:6px}

.ibtn{
  padding:5px 10px;background:none;border:1px solid var(--border);
  border-radius:var(--rx);color:var(--muted);font-size:12px;
  cursor:pointer;font-family:var(--font);transition:all var(--ease);
  -webkit-tap-highlight-color:transparent}
.ibtn:hover,.ibtn:active{border-color:var(--bh);color:var(--dim)}

.cost{font-size:11px;color:var(--muted);white-space:nowrap}
.cost b{color:var(--al);font-weight:500}

/* ── CARDS ─────────────────────────────────────────────────────────── */
.ph{padding:16px 16px 4px;flex-shrink:0}
.ph h2{font-size:16px;font-weight:600;letter-spacing:-.3px}
.ph p{font-size:13px;color:var(--muted);margin-top:3px}

.grid{
  padding:12px;
  display:grid;gap:10px;overflow-y:auto;-webkit-overflow-scrolling:touch;
  grid-template-columns:repeat(auto-fill,minmax(155px,1fr))}

.card{
  background:var(--s2);border:1px solid var(--border);border-radius:var(--r);
  padding:14px;cursor:pointer;transition:all var(--ease);position:relative;
  overflow:hidden;display:flex;flex-direction:column;gap:6px;
  -webkit-tap-highlight-color:transparent}
.card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(124,58,237,.05),transparent);
  opacity:0;transition:opacity var(--ease)}
.card:hover::before,.card:active::before{opacity:1}
.card:hover{border-color:var(--bh)}
.card.on{
  border-color:var(--acc);background:rgba(124,58,237,.07);
  box-shadow:0 0 22px rgba(124,58,237,.14)}
.card.jb.on{
  border-color:#ef4444;background:rgba(239,68,68,.07);
  box-shadow:0 0 22px rgba(239,68,68,.14)}

.ci{font-size:24px;line-height:1}
.cn{font-size:13px;font-weight:600;color:var(--txt);line-height:1.3}
.cd{font-size:11.5px;color:var(--muted);line-height:1.45}
.cbadge{
  display:inline-block;padding:2px 7px;border-radius:10px;
  font-size:10.5px;font-weight:500;background:var(--s3);
  border:1px solid var(--border);color:var(--dim);white-space:nowrap;width:fit-content}

.cacts{display:flex;gap:5px;margin-top:auto;padding-top:7px}
.ca{
  flex:1;padding:6px 8px;border-radius:var(--rx);font-size:11.5px;font-weight:500;
  cursor:pointer;font-family:var(--font);transition:all var(--ease);
  text-align:center;border:1px solid var(--border);background:none;color:var(--dim)}
.ca:hover,.ca:active{background:var(--ap);border-color:var(--acc);color:var(--al)}
.ca.pri{background:var(--ap);border-color:rgba(124,58,237,.28);color:var(--al)}
.ca.pri.ok{background:rgba(52,211,153,.09);border-color:rgba(52,211,153,.28);color:var(--ok)}

.addcard{
  background:transparent;border:1px dashed var(--bh);border-radius:var(--r);
  padding:14px;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:7px;
  color:var(--muted);font-size:13px;font-family:var(--font);
  transition:all var(--ease);min-height:110px;-webkit-tap-highlight-color:transparent}
.addcard:hover,.addcard:active{border-color:var(--acc);color:var(--al);background:var(--ap)}
.addcard-i{font-size:24px}

/* ── MODAL ─────────────────────────────────────────────────────────── */
.moverlay{
  position:fixed;inset:0;background:rgba(0,0,0,.72);
  backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);
  z-index:100;display:flex;align-items:flex-end;justify-content:center;
  animation:fadein .15s ease;padding-bottom:var(--sb)}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.moverlay.hidden{display:none}

.mdl{
  background:var(--s1);border:1px solid var(--border);
  border-radius:var(--r) var(--r) 0 0;padding:20px;
  width:100%;max-width:500px;max-height:88dvh;
  overflow-y:auto;animation:slideup .22s cubic-bezier(.4,0,.2,1)}
@keyframes slideup{from{transform:translateY(28px);opacity:0}to{transform:translateY(0);opacity:1}}

@media(min-height:650px) and (min-width:500px){
  .moverlay{align-items:center}
  .mdl{border-radius:var(--r);max-height:82dvh}}

.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.mt{font-size:16px;font-weight:600}
.mx{background:none;border:none;color:var(--muted);font-size:20px;
  cursor:pointer;padding:4px;line-height:1}
.mx:hover{color:var(--txt)}

.fg{margin-bottom:14px}
.fl{display:block;font-size:13px;font-weight:500;color:var(--dim);margin-bottom:6px}
.fi,.fta{
  width:100%;background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);
  color:var(--txt);font-family:var(--font);font-size:14px;padding:10px 12px;
  outline:none;transition:border-color var(--ease);-webkit-appearance:none}
.fi:focus,.fta:focus{border-color:rgba(124,58,237,.45)}
.fta{resize:vertical;min-height:100px;line-height:1.55}
.fhint{font-size:11.5px;color:var(--muted);margin-top:5px}

.brow{display:flex;gap:10px;margin-top:20px}
.btn{
  flex:1;padding:12px;border-radius:var(--rs);font-family:var(--font);
  font-size:14px;font-weight:500;cursor:pointer;transition:all var(--ease);
  border:none;-webkit-tap-highlight-color:transparent}
.btn-p{
  background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;
  box-shadow:0 4px 16px rgba(124,58,237,.28)}
.btn-p:hover{box-shadow:0 4px 22px rgba(124,58,237,.45);transform:translateY(-1px)}
.btn-p:active{transform:translateY(0)}
.btn-s{background:var(--s2);border:1px solid var(--border);color:var(--dim)}
.btn-s:hover{border-color:var(--bh);color:var(--txt)}

/* ── TOAST ─────────────────────────────────────────────────────────── */
.toasts{
  position:fixed;top:calc(var(--st) + 68px);left:50%;
  transform:translateX(-50%);z-index:200;
  display:flex;flex-direction:column;gap:8px;
  pointer-events:none;width:calc(100% - 32px);max-width:300px}
.toast{
  background:var(--s3);border:1px solid var(--bh);border-radius:var(--rs);
  padding:10px 16px;font-size:13px;color:var(--txt);text-align:center;
  animation:toastin .18s ease,toastout .3s ease 2.3s forwards;
  backdrop-filter:blur(10px)}
.toast.ok{border-color:rgba(52,211,153,.35);color:var(--ok)}
.toast.err{border-color:rgba(248,113,113,.35);color:var(--err)}
@keyframes toastin{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastout{to{opacity:0;transform:translateY(-8px)}}

/* ── UTIL ──────────────────────────────────────────────────────────── */
.hidden{display:none!important}
@media(max-width:360px){
  .logo{font-size:16px}
  #model-select{font-size:11.5px}
  .bbl{font-size:13.5px}
  .grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header>
    <div class="logo">✦ Nova</div>
    <div class="model-wrap">
      <select id="model-select" aria-label="Model">
        <option value="openai/gpt-4o">GPT-4o</option>
        <option value="anthropic/claude-opus-4">Claude Opus 4</option>
        <option value="anthropic/claude-sonnet-4-5">Claude Sonnet 4.5</option>
        <option value="anthropic/claude-3-5-haiku">Claude Haiku 3.5</option>
        <option value="google/gemini-2.0-flash-001">Gemini 2.0 Flash</option>
        <option value="google/gemini-2.5-pro-preview">Gemini 2.5 Pro</option>
        <option value="meta-llama/llama-3.1-405b-instruct">Llama 3.1 405B</option>
        <option value="mistralai/mistral-large">Mistral Large</option>
        <option value="deepseek/deepseek-chat">DeepSeek Chat</option>
        <option value="deepseek/deepseek-r1">DeepSeek R1</option>
      </select>
    </div>
    <button class="hbtn" id="keybtn" onclick="openKeyModal()">🔑 Key</button>
  </header>

  <!-- NAV -->
  <nav>
    <button class="tab on" data-tab="chat" onclick="goTab('chat')">

// ── STATE ─────────────────────────────────────────────────────────────
let S = {
  key: '',
  model: 'openai/gpt-4o',
  jb: null,
  ch: 'eni',
  tab: 'chat',
  itab: 'write',
  conv: [],
  jailbreaks: JSON.parse(JSON.stringify(JB_DEFAULTS)),
  characters: JSON.parse(JSON.stringify(CH_DEFAULTS)),
  pricing: {},
  scost: 0,
  stok: 0,
  streaming: false
}

function load() {
  try {
    const d = JSON.parse(localStorage.getItem('nova') || '{}')
    if (d.key) S.key = d.key
    if (d.model) S.model = d.model
    if (d.jb !== undefined) S.jb = d.jb
    if (d.ch !== undefined) S.ch = d.ch
    if (d.conv) S.conv = d.conv
    if (d.jailbreaks?.length) S.jailbreaks = d.jailbreaks
    if (d.characters?.length) S.characters = d.characters
    if (d.pricing) S.pricing = d.pricing
  } catch {}
}

function save() {
  try {
    localStorage.setItem('nova', JSON.stringify({
      key: S.key, model: S.model, jb: S.jb, ch: S.ch,
      conv: S.conv, jailbreaks: S.jailbreaks,
      characters: S.characters, pricing: S.pricing
    }))
  } catch {}
}

// ── INIT ──────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  load()
  setupVH()
  setupSwipe()
  setupVV()
  updateKeyBtn()
  initModelSel()
  renderMsgs()
  renderCtx()
  renderJB()
  renderCH()
  updateLine()
  updateCost()

  const ta = document.getElementById('uinput')
  ta.addEventListener('input', () => {
    ta.style.height = 'auto'
    ta.style.height = Math.min(ta.scrollHeight, 140) + 'px'
    updatePrev()
  })
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey && window.innerWidth > 600) {
      e.preventDefault(); send()
    }
  })

  if (S.key) fetchModels()
})

// ── VH / KEYBOARD ─────────────────────────────────────────────────────
function setupVH() {
  const upd = () => document.documentElement.style.setProperty('--vh', `${window.innerHeight * .01}px`)
  window.addEventListener('resize', upd)
  upd()
}

function setupVV() {
  if (!window.visualViewport) return
  window.visualViewport.addEventListener('resize', () => {
    const off = window.innerHeight - window.visualViewport.height - (window.visualViewport.offsetTop || 0)
    const iw = document.querySelector('.inp-wrap')
    if (iw) iw.style.paddingBottom = `calc(${Math.max(0, off)}px + 10px + var(--sb))`
  })
}

// ── SWIPE TABS ────────────────────────────────────────────────────────
function setupSwipe() {
  let sx = 0, sy = 0
  const TABS = ['chat','jailbreaks','characters']
  const el = document.querySelector('main')
  el.addEventListener('touchstart', e => { sx = e.touches[0].clientX; sy = e.touches[0].clientY }, { passive: true })
  el.addEventListener('touchend', e => {
    const dx = sx - e.changedTouches[0].clientX
    const dy = Math.abs(sy - e.changedTouches[0].clientY)
    if (Math.abs(dx) > 55 && dy < 45) {
      const i = TABS.indexOf(S.tab)
      if (dx > 0 && i < TABS.length - 1) goTab(TABS[i + 1])
      else if (dx < 0 && i > 0) goTab(TABS[i - 1])
    }
  }, { passive: true })
}

// ── TABS ──────────────────────────────────────────────────────────────
function goTab(t) {
  S.tab = t
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('on', b.dataset.tab === t))
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('on', p.id === `panel-${t}`))
  updateLine()
  if (t === 'chat') requestAnimationFrame(scrollBot)
}

function updateLine() {
  const line = document.getElementById('tline')
  const btn = document.querySelector(`.tab[data-tab="${S.tab}"]`)
  if (!line || !btn) return
  const nr = document.querySelector('nav').getBoundingClientRect()
  const br = btn.getBoundingClientRect()
  line.style.left = (br.left - nr.left) + 'px'
  line.style.width = br.width + 'px'
}

window.addEventListener('resize', updateLine)

// ── INPUT TAB ─────────────────────────────────────────────────────────
function goITab(t) {
  S.itab = t
  document.getElementById('wtab').classList.toggle('on', t === 'write')
  document.getElementById('ptab').classList.toggle('on', t === 'preview')
  const ta = document.getElementById('uinput')
  const pv = document.getElementById('preview')
  ta.style.display = t === 'write' ? '' : 'none'
  pv.style.display = t === 'preview' ? '' : 'none'
  if (t === 'preview') updatePrev(); else ta.focus()
}

function updatePrev() {
  if (S.itab !== 'preview') return
  const text = document.getElementById('uinput').value
  const pv = document.getElementById('preview')
  pv.innerHTML = text
    ? DOMPurify.sanitize(marked.parse(text))
    : '<span style="color:var(--muted)">Nothing to preview yet…</span>'
}

// ── API KEY ───────────────────────────────────────────────────────────
function updateKeyBtn() {
  const b = document.getElementById('keybtn')
  b.classList.toggle('keyed', !!S.key)
  b.textContent = S.key ? '🔑 Set' : '🔑 Key'
}

function openKeyModal() {
  modal(`
    <div class="mh"><div class="mt">OpenRouter API Key</div><button class="mx" onclick="closeModal()">✕</button></div>
    <div class="fg">
      <label class="fl">API Key</label>
      <input type="password" class="fi" id="ki" placeholder="sk-or-v1-…" value="${S.key}" autocomplete="off" />
      <div class="fhint">Stored in your browser only — only sent to OpenRouter.</div>
    </div>
    <div class="brow">
      <button class="btn btn-s" onclick="closeModal()">Cancel</button>
      <button class="btn btn-p" onclick="saveKey()">Save</button>
    </div>
  `)
  setTimeout(() => document.getElementById('ki')?.focus(), 80)
}

function saveKey() {
  const v = document.getElementById('ki')?.value?.trim()
  S.key = v || ''
  save(); updateKeyBtn(); closeModal()
  if (S.key) { toast('Key saved', 'ok'); fetchModels() }
}

// ── MODELS ────────────────────────────────────────────────────────────
async function fetchModels() {
  if (!S.key) return
  try {
    const r = await fetch('https://openrouter.ai/api/v1/models', {
      headers: { 'Authorization': `Bearer ${S.key}` }
    })
    if (!r.ok) return
    const { data } = await r.json()
    const sel = document.getElementById('model-select')

    data.forEach(m => {
      if (m.pricing) S.pricing[m.id] = {
        p: parseFloat(m.pricing.prompt || 0),
        c: parseFloat(m.pricing.completion || 0)
      }
    })
    save()

    const sorted = [...data].sort((a, b) => {
      const af = parseFloat(a.pricing?.prompt || 1) === 0
      const bf = parseFloat(b.pricing?.prompt || 1) === 0
      if (af !== bf) return af ? -1 : 1
      return (b.context_length || 0) - (a.context_length || 0)
    })

    sel.innerHTML = sorted.map(m => {
      const ctx = m.context_length ? ` (${Math.round(m.context_length / 1000)}k)` : ''
      const free = parseFloat(m.pricing?.prompt || 1) === 0 ? ' [free]' : ''
      return `<option value="${m.id}" ${m.id === S.model ? 'selected' : ''}>${m.name}${ctx}${free}</option>`
    }).join('')
  } catch {}
}

function initModelSel() {
  const sel = document.getElementById('model-select')
  sel.value = S.model
  sel.addEventListener('change', () => { S.model = sel.value; save() })
}

// ── SYSTEM PROMPT ─────────────────────────────────────────────────────
function sysprompt() {
  const parts = []
  if (S.jb) {
    const j = S.jailbreaks.find(x => x.id === S.jb)
    if (j) parts.push(j.prompt)
  }
  if (S.ch) {
    const c = S.characters.find(x => x.id === S.ch)
    if (c) parts.push(c.prompt)
  }
  return parts.join('\n\n---\n\n')
}

// ── SEND ──────────────────────────────────────────────────────────────
async function send() {
  if (S.streaming) return
  const ta = document.getElementById('uinput')
  const text = ta.value.trim()
  if (!text) return
  if (!S.key) { openKeyModal(); return }

  ta.value = ''; ta.style.height = 'auto'
  goITab('write')
  S.streaming = true
  document.getElementById('sndbtn').disabled = true
  document.getElementById('empty')?.remove()

  const um = { role: 'user', content: text, ts: Date.now() }
  S.conv.push(um)
  appendMsg(um)
  scrollBot()

  const am = { role: 'assistant', content: '', ts: Date.now() }
  const ael = appendMsg(am, true)
  scrollBot()

  try {
    const msgs = []
    const sys = sysprompt()
    if (sys) msgs.push({ role: 'system', content: sys })
    S.conv.slice(0, -1).forEach(m => msgs.push({ role: m.role, content: m.content }))
    msgs.push({ role: 'user', content: text })

    const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${S.key}`,
        'Content-Type': 'application/json',
        'HTTP-Referer': 'https://nova.app',
        'X-Title': 'Nova'
      },
      body: JSON.stringify({ model: S.model, messages: msgs, stream: true })
    })

    if (!res.ok) {
      const e = await res.json().catch(() => ({}))
      throw new Error(e.error?.message || `HTTP ${res.status}`)
    }

    const reader = res.body.getReader()
    const dec = new TextDecoder()
    let acc = '', buf = ''

    while (true) {
      const { done, value } = await reader.read()
      if (done) break
      buf += dec.decode(value, { stream: true })
      const lines = buf.split('\n')
      buf = lines.pop()
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue
        const d = line.slice(6).trim()
        if (d === '[DONE]') continue
        try {
          const p = JSON.parse(d)
          const delta = p.choices?.[0]?.delta?.content
          if (delta) { acc += delta; renderStream(ael, acc); scrollBot() }
          if (p.usage) trackCost(p.usage)
        } catch {}
      }
    }

    am.content = acc
    S.conv.push(am)
    renderFinal(ael, acc)
    save()

  } catch (err) {
    am.content = `*Error: ${err.message}*`
    S.conv.push(am)
    renderFinal(ael, am.content)
    save()
    toast(err.message, 'err')
  }

  S.streaming = false
  document.getElementById('sndbtn').disabled = false
  scrollBot()
}

// ── RENDER ────────────────────────────────────────────────────────────
function md(text, streaming = false) {
  let t = text
  if (streaming) {
    const n = (t.match(/```/g) || []).length
    if (n % 2 !== 0) t += '\n```'
  }
  return DOMPurify.sanitize(marked.parse(t), { ADD_TAGS: ['span'], ADD_ATTR: ['class'] })
}

function renderStream(el, text) {
  const b = el.querySelector('.bbl')
  b.innerHTML = md(text, true)
  const c = document.createElement('span')
  c.className = 'cur'; c.textContent = '█'
  b.appendChild(c)
  addCopy(b)
}

function renderFinal(el, text) {
  const b = el.querySelector('.bbl')
  b.innerHTML = md(text, false)
  addCopy(b)
}

function addCopy(el) {
  el.querySelectorAll('pre').forEach(pre => {
    if (pre.querySelector('.cpbtn')) return
    const btn = document.createElement('button')
    btn.className = 'cpbtn'; btn.textContent = 'Copy'
    btn.onclick = () => {
      navigator.clipboard?.writeText(pre.querySelector('code')?.textContent || '')
      btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy', 1500)
    }
    pre.appendChild(btn)
  })
}

function appendMsg(msg, streaming = false) {
  const isU = msg.role === 'user'
  const div = document.createElement('div')
  div.className = `msg ${isU ? 'u' : 'a'}`

  const av = document.createElement('div')
  av.className = 'av'; av.textContent = isU ? 'LO' : '✦'

  const body = document.createElement('div')
  body.className = 'mbody'

  const bbl = document.createElement('div')
  bbl.className = 'bbl'

  if (isU) {
    bbl.innerHTML = md(msg.content)
  } else if (streaming) {
    bbl.innerHTML = '<span class="cur">█</span>'
  } else {
    bbl.innerHTML = md(msg.content)
    addCopy(bbl)
  }

  const t = document.createElement('div')
  t.className = 'mtime'
  t.textContent = new Date(msg.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })

  body.appendChild(bbl); body.appendChild(t)
  div.appendChild(av); div.appendChild(body)
  document.getElementById('msgs').appendChild(div)
  return div
}

function renderMsgs() {
  const c = document.getElementById('msgs')
  c.innerHTML = ''
  if (!S.conv.length) {
    c.innerHTML = `<div class="empty" id="empty">
      <div class="empty-star">✦</div>
      <h3>Nova is ready</h3>
      <p>Set a character or jailbreak to shape the AI, then start chatting.</p>
    </div>`
    return
  }
  S.conv.forEach(m => appendMsg(m))
}

function scrollBot() {
  const c = document.getElementById('msgs')
  c.scrollTop = c.scrollHeight
}

// ── CONTEXT BAR ───────────────────────────────────────────────────────
function renderCtx() {
  const bar = document.getElementById('ctxbar')
  bar.innerHTML = ''
  if (S.jb) {
    const j = S.jailbreaks.find(x => x.id === S.jb)
    if (j) {
      const p = document.createElement('div')
      p.className = 'pill jb'
      p.innerHTML = `${j.icon} ${j.name} <button class="pill-x" onclick="offJB()">✕</button>`
      bar.appendChild(p)
    }
  }
  if (S.ch) {
    const c = S.characters.find(x => x.id === S.ch)
    if (c) {
      const p = document.createElement('div')
      p.className = 'pill ch'
      p.innerHTML = `${c.icon} ${c.name} <button class="pill-x" onclick="offCH()">✕</button>`
      bar.appendChild(p)
    }
  }
}

// ── JAILBREAKS ────────────────────────────────────────────────────────
function renderJB() {
  document.getElementById('jgrid').innerHTML =
    S.jailbreaks.map(j => `
      <div class="card jb ${S.jb === j.id ? 'on' : ''}">
        <div class="ci">${j.icon}</div>
        <div class="cn">${j.name}</div>
        <div class="cd">${j.desc}</div>
        <div class="cbadge">Best: ${j.bestFor}</div>
        <div class="cacts">
          <button class="ca pri ${S.jb === j.id ? 'ok' : ''}" onclick="togJB('${j.id}')">
            ${S.jb === j.id ? '✓ Active' : 'Activate'}
          </button>
          <button class="ca" onclick="prevCard('jb','${j.id}')">View</button>
        </div>
      </div>
    `).join('') + `
    <button class="addcard" onclick="addJBModal()">
      <span class="addcard-i">+</span>Custom
    </button>`
}

function togJB(id) {
  S.jb = S.jb === id ? null : id
  save(); renderJB(); renderCtx()
  toast(S.jb ? 'Jailbreak activated' : 'Jailbreak removed', 'ok')
}

function offJB() { S.jb = null; save(); renderJB(); renderCtx() }

function addJBModal() {
  modal(`
    <div class="mh"><div class="mt">Add Jailbreak</div><button class="mx" onclick="closeModal()">✕</button></div>
    <div class="fg"><label class="fl">Name</label><input type="text" class="fi" id="jn" placeholder="My Jailbreak" maxlength="30" /></div>
    <div class="fg"><label class="fl">Best For</label><input type="text" class="fi" id="jbf" placeholder="Any model" maxlength="30" /></div>
    <div class="fg"><label class="fl">Description</label><input type="text" class="fi" id="jd" placeholder="Short summary" maxlength="80" /></div>
    <div class="fg"><label class="fl">System Prompt</label><textarea class="fta" id="jp" placeholder="Enter the full system prompt…" style="min-height:130px"></textarea></div>
    <div class="brow">
      <button class="btn btn-s" onclick="closeModal()">Cancel</button>
      <button class="btn btn-p" onclick="saveJB()">Save</button>
    </div>
  `)
}

function saveJB() {
  const name = document.getElementById('jn')?.value?.trim()
  const prompt = document.getElementById('jp')?.value?.trim()
  if (!name || !prompt) { toast('Name and prompt required', 'err'); return }
  S.jailbreaks.push({
    id: 'c_' + Date.now(), name, icon: '🔧',
    bestFor: document.getElementById('jbf')?.value?.trim() || 'Any',
    desc: document.getElementById('jd')?.value?.trim() || 'Custom jailbreak',
    prompt
  })
  save(); renderJB(); closeModal(); toast('Jailbreak saved', 'ok')
}

// ── CHARACTERS ────────────────────────────────────────────────────────
function renderCH() {
  document.getElementById('cgrid').innerHTML =
    S.characters.map(c => `
      <div class="card ${S.ch === c.id ? 'on' : ''}">
        <div class="ci">${c.icon}</div>
        <div class="cn">${c.name}</div>
        <div class="cd">${c.desc}</div>
        <div class="cacts">
          <button class="ca pri ${S.ch === c.id ? 'ok' : ''}" onclick="togCH('${c.id}')">
            ${S.ch === c.id ? '✓ Active' : 'Activate'}
          </button>
          <button class="ca" onclick="editCHModal('${c.id}')">Edit</button>
        </div>
      </div>
    `).join('') + `
    <button class="addcard" onclick="editCHModal('')">
      <span class="addcard-i">+</span>New Character
    </button>`
}

function togCH(id) {
  S.ch = S.ch === id ? null : id
  save(); renderCH(); renderCtx()
  toast(S.ch ? 'Character activated' : 'Character removed', 'ok')
}

function offCH() { S.ch = null; save(); renderCH(); renderCtx() }

function editCHModal(id) {
  const c = id ? S.characters.find(x => x.id === id) : null
  modal(`
    <div class="mh"><div class="mt">${c ? 'Edit Character' : 'New Character'}</div><button class="mx" onclick="closeModal()">✕</button></div>
    <div class="fg"><label class="fl">Name</label><input type="text" class="fi" id="cn" placeholder="Character name" maxlength="30" value="${c?.name || ''}" /></div>
    <div class="fg"><label class="fl">Icon (emoji)</label><input type="text" class="fi" id="ci2" placeholder="🌟" maxlength="4" value="${c?.icon || '🌟'}" /></div>
    <div class="fg"><label class="fl">Short Description</label><input type="text" class="fi" id="cd2" placeholder="One-liner" maxlength="80" value="${c?.desc || ''}" /></div>
    <div class="fg"><label class="fl">System Prompt</label><textarea class="fta" id="cp" placeholder="Describe voice, tone, behavior…" style="min-height:130px">${c?.prompt || ''}</textarea></div>
    ${c ? `<div class="fg"><button class="ibtn" style="color:var(--err);border-color:rgba(248,113,113,.25)" onclick="delCH('${c.id}')">Delete Character</button></div>` : ''}
    <div class="brow">
      <button class="btn btn-s" onclick="closeModal()">Cancel</button>
      <button class="btn btn-p" onclick="saveCH('${id}')">Save</button>
    </div>
  `)
}

function saveCH(id) {
  const name = document.getElementById('cn')?.value?.trim()
  const prompt = document.getElementById('cp')?.value?.trim()
  if (!name || !prompt) { toast('Name and prompt required', 'err'); return }
  const obj = {
    name, prompt,
    icon: document.getElementById('ci2')?.value?.trim() || '🌟',
    desc: document.getElementById('cd2')?.value?.trim() || ''
  }
  if (id) {
    const i = S.characters.findIndex(x => x.id === id)
    if (i >= 0) S.characters[i] = { ...S.characters[i], ...obj }
  } else {
    S.characters.push({ id: 'c_' + Date.now(), ...obj })
  }
  save(); renderCH(); renderCtx(); closeModal(); toast('Character saved', 'ok')
}

function delCH(id) {
  S.characters = S.characters.filter(x => x.id !== id)
  if (S.ch === id) S.ch = null
  save(); renderCH(); renderCtx(); closeModal(); toast('Deleted')
}

// ── PREVIEW CARD ──────────────────────────────────────────────────────
function prevCard(type, id) {
  const item = type === 'jb'
    ? S.jailbreaks.find(x => x.id === id)
    : S.characters.find(x => x.id === id)
  if (!item) return
  modal(`
    <div class="mh"><div class="mt">${item.icon} ${item.name}</div><button class="mx" onclick="closeModal()">✕</button></div>
    <div style="background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);padding:14px;font-size:13px;color:var(--dim);line-height:1.75;white-space:pre-wrap;max-height:52dvh;overflow-y:auto">${item.prompt}</div>
    <div class="brow">
      <button class="btn btn-s" onclick="closeModal()">Close</button>
      <button class="btn btn-p" onclick="closeModal();${type === 'jb' ? `togJB('${id}')` : `togCH('${id}')`}">Activate</button>
    </div>
  `)
}

// ── COST ──────────────────────────────────────────────────────────────
function trackCost(usage) {
  const p = S.pricing[S.model]
  if (!p) return
  S.scost += (usage.prompt_tokens || 0) * p.p + (usage.completion_tokens || 0) * p.c
  S.stok += (usage.total_tokens || 0)
  updateCost()
}

function updateCost() {
  const el = document.getElementById('cost')
  if (!el) return
  el.innerHTML = S.scost > 0
    ? `<b>$${S.scost.toFixed(5)}</b> · ${S.stok.toLocaleString()} tok`
    : ''
}

// ── CHAT UTILS ────────────────────────────────────────────────────────
function clearChat() {
  if (!S.conv.length) return
  if (!confirm('Clear this conversation?')) return
  S.conv = []; S.scost = 0; S.stok = 0
  save(); renderMsgs(); updateCost()
}

function exportChat() {
  if (!S.conv.length) { toast('Nothing to export'); return }
  let md2 = `# Nova Export\n**Model:** ${S.model}  \n**Date:** ${new Date().toLocaleDateString()}\n\n---\n\n`
  S.conv.forEach(m => {
    const role = m.role === 'user' ? '**You**' : '**AI**'
    const t = new Date(m.ts).toLocaleTimeString()
    md2 += `### ${role} — ${t}\n\n${m.content}\n\n---\n\n`
  })
  const a = document.createElement('a')
  a.href = URL.createObjectURL(new Blob([md2], { type: 'text/markdown' }))
  a.download = `nova-${Date.now()}.md`
  a.click()
  toast('Exported!', 'ok')
}

// ── MODAL ─────────────────────────────────────────────────────────────
function modal(html) {
  document.getElementById('mdl').innerHTML = html
  document.getElementById('mov').classList.remove('hidden')
}
function closeModal() { document.getElementById('mov').classList.add('hidden') }
function handleOvClick(e) { if (e.target === document.getElementById('mov')) closeModal() }

// ── TOAST ─────────────────────────────────────────────────────────────
function toast(msg, type = '') {
  const c = document.getElementById('toasts')
  const el = document.createElement('div')
  el.className = `toast ${type}`
  el.textContent = msg
  c.appendChild(el)
  setTimeout(() => el.remove(), 2700)
}
</script>
</body>
</html>
